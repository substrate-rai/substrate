<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Substrate — Chat</title>
<style>
  :root {
    --bg: #0a0f0a;
    --surface: #111a11;
    --border: #1a2e1a;
    --text: #c8d4c0;
    --text-dim: #6a7a62;
    --accent: #00ffaa;
    --accent-dim: #00aa66;
    --user-bg: #1a2420;
    --claude-bg: #0f1a14;
    --error: #ff4444;
    --mono: 'IBM Plex Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header .logo {
    color: var(--accent);
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
  }
  header .model {
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    margin-left: auto;
  }
  header .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--accent-dim);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 14px 18px;
    border-radius: 8px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user {
    background: var(--user-bg);
    border-left: 2px solid var(--accent-dim);
  }
  .msg.assistant {
    background: var(--claude-bg);
    border-left: 2px solid var(--border);
  }
  .msg .role {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    color: var(--text-dim);
  }
  .msg.user .role { color: var(--accent-dim); }
  .msg .content { font-size: 14px; }
  .msg .content code {
    background: rgba(0,255,170,0.08);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 13px;
  }
  .msg .content pre {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 4px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: var(--mono);
    font-size: 13px;
  }
  .msg .content pre code {
    background: none;
    padding: 0;
  }

  .typing {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 14px 18px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
  }
  .typing::after {
    content: '';
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Input area */
  #input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #input-wrap {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 12px 14px;
    resize: none;
    min-height: 46px;
    max-height: 200px;
    outline: none;
    transition: border-color 0.15s;
  }
  #input:focus { border-color: var(--accent-dim); }
  #input::placeholder { color: var(--text-dim); }

  #send {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 12px 18px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  #send:hover { opacity: 0.85; }
  #send:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Empty state */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-dim);
    font-family: var(--mono);
    gap: 8px;
  }
  .empty .mark {
    font-size: 32px;
    color: var(--accent);
    opacity: 0.4;
  }
  .empty p { font-size: 13px; }
</style>
</head>
<body>

<header>
  <span class="dot"></span>
  <span class="logo">SUBSTRATE</span>
  <span class="model">claude · sonnet</span>
</header>

<div id="messages">
  <div class="empty">
    <div class="mark">⌘</div>
    <p>the substrate is listening</p>
  </div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <textarea id="input" rows="1" placeholder="say something..." autofocus></textarea>
    <button id="send">SEND</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

let conversation = [];
let busy = false;

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

// Enter to send, Shift+Enter for newline
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener('click', send);

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatContent(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  return text;
}

function addMessage(role, text) {
  // Remove empty state
  const empty = messagesEl.querySelector('.empty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const label = role === 'user' ? 'you' : 'claude';
  div.innerHTML = `<div class="role">${label}</div><div class="content">${formatContent(text)}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.textContent = 'thinking';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || busy) return;

  busy = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });

  showTyping();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversation }),
    });
    const data = await resp.json();

    hideTyping();

    if (data.error) {
      addMessage('assistant', `Error: ${data.error}`);
    } else {
      const reply = data.content?.[0]?.text || 'No response';
      addMessage('assistant', reply);
      conversation.push({ role: 'assistant', content: reply });
    }
  } catch (err) {
    hideTyping();
    addMessage('assistant', `Connection error: ${err.message}`);
  }

  busy = false;
  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
