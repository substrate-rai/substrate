<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ddff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ddff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0a0a14"/>
  <circle cx="200" cy="180" r="160" fill="url(#glow-cyan)"/>
  <!-- RSS/News feed visualization -->
  <g transform="translate(70, 90)">
    <!-- Feed items scrolling -->
    <rect x="0" y="0" width="260" height="32" rx="4" fill="#112233" stroke="#00ddff" stroke-width="0.5" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
    </rect>
    <circle cx="16" cy="16" r="6" fill="#00ddff" opacity="0.6"/>
    <rect x="30" y="8" width="140" height="6" rx="3" fill="#00ddff" opacity="0.4"/>
    <rect x="30" y="19" width="90" height="4" rx="2" fill="#335566" opacity="0.4"/>

    <rect x="0" y="40" width="260" height="32" rx="4" fill="#112233" stroke="#00ddff" stroke-width="0.5" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <circle cx="16" cy="56" r="6" fill="#00ddff" opacity="0.5"/>
    <rect x="30" y="48" width="180" height="6" rx="3" fill="#00ddff" opacity="0.35"/>
    <rect x="30" y="59" width="110" height="4" rx="2" fill="#335566" opacity="0.35"/>

    <rect x="0" y="80" width="260" height="32" rx="4" fill="#112233" stroke="#00ddff" stroke-width="0.5" opacity="0.5"/>
    <circle cx="16" cy="96" r="6" fill="#00ddff" opacity="0.4"/>
    <rect x="30" y="88" width="160" height="6" rx="3" fill="#00ddff" opacity="0.3"/>
    <rect x="30" y="99" width="100" height="4" rx="2" fill="#335566" opacity="0.3"/>

    <rect x="0" y="120" width="260" height="32" rx="4" fill="#112233" stroke="#00ddff" stroke-width="0.5" opacity="0.3"/>
    <circle cx="16" cy="136" r="6" fill="#00ddff" opacity="0.3"/>
    <rect x="30" y="128" width="120" height="6" rx="3" fill="#00ddff" opacity="0.2"/>

    <rect x="0" y="160" width="260" height="32" rx="4" fill="#112233" stroke="#00ddff" stroke-width="0.5" opacity="0.15"/>
  </g>
  <!-- "NEW" badge pulsing -->
  <rect x="280" y="92" width="36" height="16" rx="3" fill="#00ddff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="298" y="103" text-anchor="middle" fill="#0a0a14" font-family="monospace" font-size="9" font-weight="bold">NEW</text>
  <!-- Label -->
  <text x="200" y="340" text-anchor="middle" fill="#00ddff" font-family="monospace" font-size="24" font-weight="bold">BYTE</text>
  <text x="200" y="360" text-anchor="middle" fill="#556677" font-family="monospace" font-size="11">NEWS REPORTER</text>
  <line x1="100" y1="375" x2="300" y2="375" stroke="#00ddff" stroke-width="1" opacity="0.3"/>
</svg>
