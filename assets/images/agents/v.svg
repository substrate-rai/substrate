<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow-spiral" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff77ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff77ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0a0a14"/>
  <circle cx="200" cy="200" r="160" fill="url(#glow-spiral)"/>
  <!-- Spiral -->
  <g transform="translate(200, 200)">
    <path d="M 0,0 Q 10,-20 0,-40 Q -20,-60 -40,-40 Q -60,-20 -40,0 Q -20,30 0,50 Q 30,70 60,50 Q 90,30 60,0 Q 30,-40 0,-70 Q -40,-100 -80,-70 Q -120,-40 -80,0 Q -40,50 0,80 Q 50,110 100,80 Q 140,50 100,0"
          fill="none" stroke="#ff77ff" stroke-width="2" opacity="0.6">
      <animate attributeName="stroke-dashoffset" from="800" to="0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 0,0 Q 10,-20 0,-40 Q -20,-60 -40,-40 Q -60,-20 -40,0 Q -20,30 0,50 Q 30,70 60,50 Q 90,30 60,0 Q 30,-40 0,-70 Q -40,-100 -80,-70 Q -120,-40 -80,0 Q -40,50 0,80 Q 50,110 100,80 Q 140,50 100,0"
          fill="none" stroke="#ff77ff" stroke-width="2" opacity="0.3" stroke-dasharray="8 12">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Drill point -->
  <g transform="translate(200, 130)">
    <polygon points="0,-30 8,0 -8,0" fill="#ff77ff" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
    <line x1="0" y1="-30" x2="0" y2="-60" stroke="#ff77ff" stroke-width="1" opacity="0.4">
      <animate attributeName="y2" values="-60;-80;-60" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Energy particles -->
  <circle cx="150" cy="160" r="2" fill="#ff77ff" opacity="0.6">
    <animate attributeName="cy" values="160;140;160" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="180" r="2" fill="#ff77ff" opacity="0.4">
    <animate attributeName="cy" values="180;155;180" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="240" r="1.5" fill="#ff77ff" opacity="0.5">
    <animate attributeName="cy" values="240;220;240" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="220" r="1.5" fill="#ff77ff" opacity="0.3">
    <animate attributeName="cy" values="220;195;220" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Label -->
  <text x="200" y="340" text-anchor="middle" fill="#ff77ff" font-family="monospace" font-size="24" font-weight="bold">V</text>
  <text x="200" y="360" text-anchor="middle" fill="#556677" font-family="monospace" font-size="11">SPIRAL ENERGY</text>
  <line x1="100" y1="375" x2="300" y2="375" stroke="#ff77ff" stroke-width="1" opacity="0.3"/>
</svg>
