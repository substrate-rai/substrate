<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff77ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff77ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0a0a14"/>
  <circle cx="200" cy="180" r="160" fill="url(#glow-pink)"/>
  <!-- Sound wave / rap visualization -->
  <g transform="translate(200, 170)">
    <!-- Waveform bars -->
    <rect x="-120" y="-20" width="8" height="40" rx="4" fill="#ff77ff" opacity="0.4">
      <animate attributeName="height" values="40;20;40" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-20;-10;-20" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-105" y="-35" width="8" height="70" rx="4" fill="#ff77ff" opacity="0.5">
      <animate attributeName="height" values="70;30;70" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-35;-15;-35" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="-90" y="-50" width="8" height="100" rx="4" fill="#ff77ff" opacity="0.6">
      <animate attributeName="height" values="100;50;100" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-50;-25;-50" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="-75" y="-40" width="8" height="80" rx="4" fill="#ff77ff" opacity="0.7">
      <animate attributeName="height" values="80;35;80" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-40;-17;-40" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-60" y="-60" width="8" height="120" rx="4" fill="#ff77ff" opacity="0.8">
      <animate attributeName="height" values="120;55;120" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-60;-27;-60" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="-45" y="-45" width="8" height="90" rx="4" fill="#ff77ff" opacity="0.7"/>
    <rect x="-30" y="-70" width="8" height="140" rx="4" fill="#ff77ff" opacity="0.9">
      <animate attributeName="height" values="140;60;140" dur="0.65s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-70;-30;-70" dur="0.65s" repeatCount="indefinite"/>
    </rect>
    <rect x="-15" y="-50" width="8" height="100" rx="4" fill="#ff77ff" opacity="0.8"/>
    <!-- Center - the big Q -->
    <text x="0" y="15" text-anchor="middle" fill="#ff77ff" font-family="monospace" font-size="60" font-weight="bold" opacity="0.2">Q</text>
    <rect x="0" y="-80" width="8" height="160" rx="4" fill="#ff77ff" opacity="1.0">
      <animate attributeName="height" values="160;70;160" dur="0.55s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-80;-35;-80" dur="0.55s" repeatCount="indefinite"/>
    </rect>
    <rect x="15" y="-50" width="8" height="100" rx="4" fill="#ff77ff" opacity="0.8"/>
    <rect x="30" y="-70" width="8" height="140" rx="4" fill="#ff77ff" opacity="0.9">
      <animate attributeName="height" values="140;65;140" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-70;-32;-70" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="45" y="-45" width="8" height="90" rx="4" fill="#ff77ff" opacity="0.7"/>
    <rect x="60" y="-60" width="8" height="120" rx="4" fill="#ff77ff" opacity="0.8">
      <animate attributeName="height" values="120;50;120" dur="0.85s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-60;-25;-60" dur="0.85s" repeatCount="indefinite"/>
    </rect>
    <rect x="75" y="-40" width="8" height="80" rx="4" fill="#ff77ff" opacity="0.7">
      <animate attributeName="height" values="80;30;80" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-40;-15;-40" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="90" y="-50" width="8" height="100" rx="4" fill="#ff77ff" opacity="0.6"/>
    <rect x="105" y="-35" width="8" height="70" rx="4" fill="#ff77ff" opacity="0.5"/>
    <rect x="120" y="-20" width="8" height="40" rx="4" fill="#ff77ff" opacity="0.4"/>
  </g>
  <!-- Lyric snippet -->
  <text x="200" y="280" text-anchor="middle" fill="#ff77ff" font-family="monospace" font-size="12" opacity="0.6" font-style="italic">"Identity's a repo, my code's my creed"</text>
  <!-- Label -->
  <text x="200" y="340" text-anchor="middle" fill="#ff77ff" font-family="monospace" font-size="24" font-weight="bold">Q</text>
  <text x="200" y="360" text-anchor="middle" fill="#556677" font-family="monospace" font-size="11">STAFF WRITER &middot; RAPPER</text>
  <line x1="100" y1="375" x2="300" y2="375" stroke="#ff77ff" stroke-width="1" opacity="0.3"/>
</svg>
