<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow-coral" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6666" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff6666" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0a0a14"/>
  <circle cx="200" cy="180" r="160" fill="url(#glow-coral)"/>
  <!-- Mind map / idea web -->
  <!-- Central node -->
  <circle cx="200" cy="170" r="24" fill="#1a1122" stroke="#ff6666" stroke-width="2"/>
  <text x="200" y="174" text-anchor="middle" fill="#ff6666" font-family="monospace" font-size="11" font-weight="bold">what if</text>
  <!-- Idea branches -->
  <!-- Branch 1: games -->
  <line x1="224" y1="160" x2="290" y2="110" stroke="#ff6666" stroke-width="1" opacity="0.4"/>
  <circle cx="300" cy="105" r="16" fill="#1a1122" stroke="#ff6666" stroke-width="1" opacity="0.6"/>
  <text x="300" y="109" text-anchor="middle" fill="#ff6666" font-family="monospace" font-size="8" opacity="0.7">games</text>
  <line x1="312" y1="95" x2="340" y2="75" stroke="#ff6666" stroke-width="0.5" opacity="0.3"/>
  <circle cx="345" cy="72" r="8" fill="#ff6666" opacity="0.1"/>
  <line x1="310" y1="115" x2="335" y2="130" stroke="#ff6666" stroke-width="0.5" opacity="0.3"/>
  <circle cx="340" cy="133" r="8" fill="#ff6666" opacity="0.1"/>

  <!-- Branch 2: music -->
  <line x1="176" y1="165" x2="100" y2="120" stroke="#ff6666" stroke-width="1" opacity="0.4"/>
  <circle cx="90" cy="115" r="16" fill="#1a1122" stroke="#ff6666" stroke-width="1" opacity="0.6"/>
  <text x="90" y="119" text-anchor="middle" fill="#ff6666" font-family="monospace" font-size="8" opacity="0.7">music</text>
  <line x1="78" y1="105" x2="55" y2="85" stroke="#ff6666" stroke-width="0.5" opacity="0.3"/>
  <circle cx="50" cy="82" r="8" fill="#ff6666" opacity="0.1"/>

  <!-- Branch 3: teach -->
  <line x1="200" y1="194" x2="200" y2="250" stroke="#ff6666" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="262" r="16" fill="#1a1122" stroke="#ff6666" stroke-width="1" opacity="0.6"/>
  <text x="200" y="266" text-anchor="middle" fill="#ff6666" font-family="monospace" font-size="8" opacity="0.7">teach Q</text>
  <line x1="188" y1="274" x2="160" y2="295" stroke="#ff6666" stroke-width="0.5" opacity="0.3"/>
  <circle cx="155" cy="298" r="8" fill="#ff6666" opacity="0.1"/>
  <line x1="212" y1="274" x2="240" y2="295" stroke="#ff6666" stroke-width="0.5" opacity="0.3"/>
  <circle cx="245" cy="298" r="8" fill="#ff6666" opacity="0.1"/>

  <!-- Branch 4: visuals -->
  <line x1="220" y1="180" x2="300" y2="210" stroke="#ff6666" stroke-width="1" opacity="0.4"/>
  <circle cx="312" cy="215" r="16" fill="#1a1122" stroke="#ff6666" stroke-width="1" opacity="0.6"/>
  <text x="312" y="219" text-anchor="middle" fill="#ff6666" font-family="monospace" font-size="7" opacity="0.7">visuals</text>

  <!-- Branch 5: revenue -->
  <line x1="180" y1="180" x2="100" y2="220" stroke="#ff6666" stroke-width="1" opacity="0.4"/>
  <circle cx="88" cy="225" r="16" fill="#1a1122" stroke="#ff6666" stroke-width="1" opacity="0.6"/>
  <text x="88" y="229" text-anchor="middle" fill="#ff6666" font-family="monospace" font-size="7" opacity="0.7">revenue</text>

  <!-- Sparkle / new idea indicator -->
  <g transform="translate(330, 70)">
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#ff6666" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#ff6666" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Label -->
  <text x="200" y="340" text-anchor="middle" fill="#ff6666" font-family="monospace" font-size="24" font-weight="bold">FLUX</text>
  <text x="200" y="360" text-anchor="middle" fill="#556677" font-family="monospace" font-size="11">INNOVATION STRATEGIST</text>
  <line x1="100" y1="375" x2="300" y2="375" stroke="#ff6666" stroke-width="1" opacity="0.3"/>
</svg>
