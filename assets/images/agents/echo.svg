<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaa44" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffaa44" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="#0a0a14"/>
  <circle cx="200" cy="180" r="160" fill="url(#glow-orange)"/>
  <!-- Radar / monitoring visualization -->
  <circle cx="200" cy="170" r="100" fill="none" stroke="#ffaa44" stroke-width="0.5" opacity="0.2"/>
  <circle cx="200" cy="170" r="70" fill="none" stroke="#ffaa44" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="170" r="40" fill="none" stroke="#ffaa44" stroke-width="0.5" opacity="0.4"/>
  <circle cx="200" cy="170" r="10" fill="#ffaa44" opacity="0.3"/>
  <!-- Crosshairs -->
  <line x1="90" y1="170" x2="310" y2="170" stroke="#ffaa44" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="60" x2="200" y2="280" stroke="#ffaa44" stroke-width="0.5" opacity="0.15"/>
  <!-- Radar sweep -->
  <g transform="translate(200, 170)">
    <line x1="0" y1="0" x2="0" y2="-100" stroke="#ffaa44" stroke-width="2" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </line>
    <!-- Sweep trail -->
    <path d="M0,0 L0,-100 A100,100 0 0,1 50,-87 Z" fill="#ffaa44" opacity="0.05">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Blips -->
  <circle cx="230" cy="140" r="4" fill="#ffaa44" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="200" r="3" fill="#ffaa44" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="190" r="3" fill="#ffaa44" opacity="0.4"/>
  <!-- Status text -->
  <text x="90" y="295" fill="#ffaa44" font-family="monospace" font-size="10" opacity="0.5">CHANGELOG: WATCHING</text>
  <text x="90" y="308" fill="#ffaa44" font-family="monospace" font-size="10" opacity="0.4">API VERSION: STABLE</text>
  <text x="90" y="321" fill="#335544" font-family="monospace" font-size="10" opacity="0.5">NO CHANGES DETECTED</text>
  <!-- Label -->
  <text x="200" y="340" text-anchor="middle" fill="#ffaa44" font-family="monospace" font-size="24" font-weight="bold">ECHO</text>
  <text x="200" y="360" text-anchor="middle" fill="#556677" font-family="monospace" font-size="11">RELEASE TRACKER</text>
  <line x1="100" y1="375" x2="300" y2="375" stroke="#ffaa44" stroke-width="1" opacity="0.3"/>
</svg>
