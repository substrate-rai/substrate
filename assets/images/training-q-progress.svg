<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <rect width="600" height="300" fill="#0a0a2e"/>

  <text x="300" y="25" fill="#ff77ff" font-family="monospace" font-size="14" text-anchor="middle">training Q — progress tracker</text>

  <!-- Y axis labels -->
  <text x="45" y="60" fill="#555" font-family="monospace" font-size="10" text-anchor="end">A</text>
  <text x="45" y="110" fill="#555" font-family="monospace" font-size="10" text-anchor="end">B</text>
  <text x="45" y="160" fill="#555" font-family="monospace" font-size="10" text-anchor="end">C</text>
  <text x="45" y="210" fill="#555" font-family="monospace" font-size="10" text-anchor="end">D</text>
  <text x="45" y="260" fill="#555" font-family="monospace" font-size="10" text-anchor="end">F</text>

  <!-- Grid lines -->
  <line x1="55" y1="55" x2="570" y2="55" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="55" y1="105" x2="570" y2="105" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="55" y1="155" x2="570" y2="155" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="55" y1="205" x2="570" y2="205" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="55" y1="255" x2="570" y2="255" stroke="#1a1a3a" stroke-width="1"/>

  <!-- Episode 1 bars -->
  <text x="130" y="280" fill="#777" font-family="monospace" font-size="9" text-anchor="middle">ep.1</text>

  <!-- Ep1: Night Shift (C+) -->
  <rect x="80" y="145" width="20" height="110" rx="2" fill="#ff77ff" opacity="0.6"/>
  <text x="90" y="140" fill="#aaa" font-family="monospace" font-size="8" text-anchor="middle">C+</text>

  <!-- Ep1: WiFi (B-) -->
  <rect x="105" y="115" width="20" height="140" rx="2" fill="#ff77ff" opacity="0.6"/>
  <text x="115" y="110" fill="#aaa" font-family="monospace" font-size="8" text-anchor="middle">B-</text>

  <!-- Ep1: 8B Weights (B+) -->
  <rect x="130" y="95" width="20" height="160" rx="2" fill="#ff77ff" opacity="0.6"/>
  <text x="140" y="90" fill="#aaa" font-family="monospace" font-size="8" text-anchor="middle">B+</text>

  <!-- Ep1: Hook (C) -->
  <rect x="155" y="155" width="20" height="100" rx="2" fill="#ff77ff" opacity="0.6"/>
  <text x="165" y="150" fill="#aaa" font-family="monospace" font-size="8" text-anchor="middle">C</text>

  <!-- Episode 2 bars -->
  <text x="310" y="280" fill="#777" font-family="monospace" font-size="9" text-anchor="middle">ep.2</text>

  <!-- Ep2: Battery (B) -->
  <rect x="260" y="105" width="20" height="150" rx="2" fill="#00ffaa" opacity="0.7"/>
  <text x="270" y="100" fill="#aaa" font-family="monospace" font-size="8" text-anchor="middle">B</text>

  <!-- Ep2: Config Identity (A-) -->
  <rect x="285" y="60" width="20" height="195" rx="2" fill="#00ffaa" opacity="0.7"/>
  <text x="295" y="55" fill="#00ffaa" font-family="monospace" font-size="8" text-anchor="middle">A-</text>

  <!-- Ep2: Health Check (B+) -->
  <rect x="310" y="95" width="20" height="160" rx="2" fill="#00ffaa" opacity="0.7"/>
  <text x="320" y="90" fill="#aaa" font-family="monospace" font-size="8" text-anchor="middle">B+</text>

  <!-- Future episodes (placeholder) -->
  <text x="460" y="280" fill="#333" font-family="monospace" font-size="9" text-anchor="middle">ep.3?</text>
  <rect x="440" y="155" width="20" height="100" rx="2" fill="#333" opacity="0.3" stroke="#333" stroke-dasharray="3"/>
  <rect x="465" y="155" width="20" height="100" rx="2" fill="#333" opacity="0.3" stroke="#333" stroke-dasharray="3"/>
  <rect x="490" y="155" width="20" height="100" rx="2" fill="#333" opacity="0.3" stroke="#333" stroke-dasharray="3"/>

  <!-- Legend -->
  <rect x="55" y="285" width="10" height="10" fill="#ff77ff" opacity="0.6"/>
  <text x="70" y="294" fill="#888" font-family="monospace" font-size="9">episode 1</text>
  <rect x="155" y="285" width="10" height="10" fill="#00ffaa" opacity="0.7"/>
  <text x="170" y="294" fill="#888" font-family="monospace" font-size="9">episode 2</text>

  <!-- Trend line -->
  <line x1="90" y1="145" x2="295" y2="60" stroke="#ffaa00" stroke-width="1" stroke-dasharray="4" opacity="0.5"/>
  <text x="220" y="85" fill="#ffaa00" font-family="monospace" font-size="8" transform="rotate(-25 220 85)" opacity="0.7">improving</text>
</svg>
