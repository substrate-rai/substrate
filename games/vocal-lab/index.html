<body>

<div id="app">
  <div class="header">
    <h1>VOCAL LAB</h1>
    <p class="subtitle">Interactive Sound Design Course</p>
  </div>

  <div class="lesson-nav glass" id="lessonNav"></div>

  <div class="lesson-panel glass" id="lessonPanel">
    <!-- Dynamically populated -->
  </div>
</div>

<script src="../shared/substrate-frame.js"
  data-title="Vocal Lab"
  data-lore="Sculpt sound from silence"
  data-agent="Sync"
  data-agent-color="#0078D4"
  data-no-audio="true">
</script>

<script>
(function() {
'use strict';

// ─── Audio Context ──────────────────────────────────────────────────────────

let actx = null;
let masterGain = null;
let playerNodes = {};
let targetNodes = {};
let analyserPlayer = null;
let analyserTarget = null;
let isPlayerPlaying = false;
let isTargetPlaying = false;

function ensureAudioContext() {
  if (actx) { if (actx.state === 'suspended') actx.resume(); return; }
  actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  masterGain = actx.createGain();
  masterGain.gain.value = 0.35;
  masterGain.connect(actx.destination);

  analyserPlayer = actx.createAnalyser();
  analyserPlayer.fftSize = 2048;
  analyserPlayer.connect(masterGain);

  analyserTarget = actx.createAnalyser();
  analyserTarget.fftSize = 2048;
  analyserTarget.connect(masterGain);
}

// ─── Lesson Data ────────────────────────────────────────────────────────────

const LESSONS = [
  {
    id: 1,
    title: 'Waveforms',
    desc: 'Every sound begins with a waveform — a repeating pattern of air pressure. Each shape has a distinct character: sine is pure and smooth, square is hollow and buzzy, sawtooth is bright and rich, triangle is soft and mellow.',
    targetGen: () => ({ type: ['sine','square','sawtooth','triangle'][Math.floor(Math.random()*4)], freq: 330 }),
  },
  {
    id: 2,
    title: 'Frequency & Pitch',
    desc: 'Frequency is how fast a waveform repeats, measured in Hertz (Hz). Higher frequency means higher pitch. Doubling the frequency raises the pitch by one octave. Tune your oscillator to match the target.',
    targetGen: () => {
      const notes = [220, 261.63, 293.66, 329.63, 392, 440, 523.25];
      return { type: 'sawtooth', freq: notes[Math.floor(Math.random()*notes.length)] };
    },
  },
  {
    id: 3,
    title: 'Amplitude & Envelopes',
    desc: 'An envelope shapes how a sound\'s volume changes over time. Attack is how quickly it rises, Decay how fast it drops to the Sustain level, and Release is the fade after you stop. These four stages (ADSR) define whether a sound feels like a pluck, a pad, or a stab.',
    targetGen: () => {
      const presets = [
        { a: 0.01, d: 0.15, s: 0.0, r: 0.1, name: 'pluck' },
        { a: 0.6, d: 0.3, s: 0.7, r: 1.0, name: 'pad' },
        { a: 0.01, d: 0.08, s: 0.5, r: 0.05, name: 'stab' },
        { a: 0.3, d: 0.5, s: 0.4, r: 0.6, name: 'swell' },
      ];
      return { type: 'sawtooth', freq: 330, env: presets[Math.floor(Math.random()*presets.length)] };
    },
  },
  {
    id: 4,
    title: 'Filters',
    desc: 'Filters remove frequencies from a sound. A low-pass filter lets low frequencies through and cuts highs — making things sound muffled. A high-pass does the opposite. Band-pass lets only a narrow range through. The cutoff frequency and resonance (Q) are your main controls.',
    targetGen: () => {
      const types = ['lowpass', 'highpass', 'bandpass'];
      const t = types[Math.floor(Math.random()*types.length)];
      const cutoff = 200 + Math.floor(Math.random() * 3800);
      const q = 1 + Math.floor(Math.random() * 14);
      return { type: 'sawtooth', freq: 220, filter: { type: t, cutoff, q } };
    },
  },
  {
    id: 5,
    title: 'LFO & Modulation',
    desc: 'An LFO (Low Frequency Oscillator) is a slow oscillator that modulates another parameter over time. Route it to pitch for vibrato, to amplitude for tremolo, or to a filter cutoff for a wah effect. Rate controls speed, depth controls intensity.',
    targetGen: () => {
      const targets = ['pitch', 'amplitude', 'filter'];
      const target = targets[Math.floor(Math.random()*targets.length)];
      const rate = 1 + Math.random() * 9;
      const depth = 0.2 + Math.random() * 0.6;
      return { type: 'sawtooth', freq: 330, lfo: { target, rate: Math.round(rate*10)/10, depth: Math.round(depth*100)/100 }, filter: { type: 'lowpass', cutoff: 2000, q: 4 } };
    },
  },
  {
    id: 6,
    title: 'Harmonics & Overtones',
    desc: 'A pure sine wave has one frequency. Real instruments produce overtones — multiples of the fundamental. By adding harmonics at different volumes, you can build complex timbres from simple sine waves. This is additive synthesis.',
    targetGen: () => {
      const presets = [
        { name: 'square-ish', harmonics: [1, 0, 0.33, 0, 0.2, 0, 0.14, 0] },
        { name: 'saw-ish', harmonics: [1, 0.5, 0.33, 0.25, 0.2, 0.17, 0.14, 0.12] },
        { name: 'clarinet', harmonics: [1, 0, 0.75, 0, 0.5, 0, 0.25, 0] },
        { name: 'bright', harmonics: [1, 0.8, 0.6, 0.5, 0.4, 0.35, 0.3, 0.25] },
        { name: 'hollow', harmonics: [1, 0, 0.4, 0, 0.15, 0, 0.05, 0] },
      ];
      const p = presets[Math.floor(Math.random()*presets.length)];
      return { freq: 220, harmonics: p.harmonics, name: p.name };
    },
  },
  {
    id: 7,
    title: 'Effects',
    desc: 'Effects processors transform sounds after synthesis. Delay repeats the signal with a time gap, creating echoes. Reverb simulates room reflections, adding space and depth. Distortion adds grit by clipping the waveform.',
    targetGen: () => {
      const fx = {
        delay: { time: 0.1 + Math.random() * 0.4, feedback: 0.2 + Math.random() * 0.5, mix: 0.3 + Math.random() * 0.4 },
        distortion: { amount: 2 + Math.random() * 18, mix: 0.5 + Math.random() * 0.4 },
      };
      return { type: 'sawtooth', freq: 330, effects: fx };
    },
  },
  {
    id: 8,
    title: 'Sound Design Challenges',
    desc: 'Put it all together. Use everything you\'ve learned — waveforms, filters, envelopes, LFOs, and effects — to design specific sounds. No target to match this time; express yourself and see how close you get to the concept.',
    challenges: [
      { name: 'Laser Beam', hint: 'Try a high-pitched sawtooth with a fast pitch sweep downward.' },
      { name: 'Rain Drops', hint: 'Short plucky sine tones at varying pitches with some reverb.' },
      { name: 'Bass Drop', hint: 'Start low, use a sawtooth with a low-pass filter sweep and long release.' },
      { name: 'Alarm Siren', hint: 'Sine wave with an LFO on pitch — fast rate, wide depth.' },
      { name: 'Wind', hint: 'Filtered noise with a slow LFO on the filter cutoff.' },
    ],
  },
];

// ─── State ──────────────────────────────────────────────────────────────────

let state = {
  currentLesson: 1,
  completed: loadProgress(),
  currentTarget: null,
  score: 0,
  playerParams: {},
  challengeIndex: 0,
};

function loadProgress() {
  try {
    const p = JSON.parse(localStorage.getItem('vocallab-progress') || '[]');
    return Array.isArray(p) ? p : [];
  } catch(e) { return []; }
}

function saveProgress() {
  try { localStorage.setItem('vocallab-progress', JSON.stringify(state.completed)); } catch(e) {}
}

function isUnlocked(lessonId) {
  if (lessonId === 1) return true;
  return state.completed.includes(lessonId - 1);
}

// ─── Rendering ──────────────────────────────────────────────────────────────

function renderNav() {
  const nav = document.getElementById('lessonNav');
  nav.innerHTML = '';
  LESSONS.forEach(l => {
    const dot = document.createElement('button');
    dot.className = 'lesson-dot';
    dot.textContent = l.id;
    dot.setAttribute('aria-label', 'Lesson ' + l.id + ': ' + l.title);
    if (l.id === state.currentLesson) dot.classList.add('active');
    if (state.completed.includes(l.id)) dot.classList.add('completed');
    if (!isUnlocked(l.id)) dot.classList.add('locked');
    dot.addEventListener('click', () => {
      if (!isUnlocked(l.id)) return;
      stopAll();
      state.currentLesson = l.id;
      state.score = 0;
      state.currentTarget = null;
      renderNav();
      renderLesson();
    });
    nav.appendChild(dot);
  });
}

function renderLesson() {
  const panel = document.getElementById('lessonPanel');
  const lesson = LESSONS[state.currentLesson - 1];

  stopAll();

  let html = `<div class="lesson-title">${lesson.id}. ${lesson.title}</div>`;
  html += `<p class="lesson-desc">${lesson.desc}</p>`;

  // Build lesson-specific UI
  switch(lesson.id) {
    case 1: html += buildLesson1(); break;

    case 4: html += buildLesson4(); break;
    case 5: html += buildLesson5(); break;
    case 6: html += buildLesson6(); break;
    case 7: html += buildLesson7(); break;

  // Viz + score (not for lesson 8)
  if (lesson.id !== 8) {
    html += `
      <div class="viz-row">
        <div class="viz-panel">
          <div class="viz-label">Your Sound</div>
          <canvas id="vizPlayer"></canvas>
        </div>
        <div class="viz-panel">

        <div class="score-msg" id="scoreMsg"></div>
      </div>
    `;
  } else {
    html += `
      <div class="viz-row">
        <div class="viz-panel" style="grid-column: 1/-1;">
          <div class="viz-label">Your Sound</div>
          <canvas id="vizPlayer"></canvas>
        </div>
      </div>
    `;
  }

  html += `<div class="lesson-complete" id="lessonComplete">
    <h3>Lesson Complete!</h3>
    <p id="completeMsg">Great work.</p>
    <button class="btn btn-success" id="nextLessonBtn">Next Lesson</button>
  </div>`;

  panel.innerHTML = html;

  // Setup interactivity after DOM insert
  setTimeout(() => {
    setupLessonControls(lesson.id);
    startVisualization();
  }, 30);
}

// ─── Lesson Control Setup ───────────────────────────────────────────────────

function setupLessonControls(id) {
  switch(id) {
    case 1: setupLesson1(); break;
    case 2: setupLesson2(); break;
    case 3: setupLesson3(); break;
    case 4: setupLesson4(); break;
    case 5: setupLesson5(); break;
    case 6: setupLesson6(); break;
    case 7: setupLesson7(); break;
    case 8: setupLesson8(); break;
  }
}

function setupLesson1() {
  const lesson = LESSONS[0];
  state.currentTarget = lesson.targetGen();

  document.querySelectorAll('#waveButtons .wave-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#waveButtons .wave-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.playerParams.type = btn.dataset.wave;
    });
  });

  setupPlayButtons(() => playTone(state.playerParams, analyserPlayer, 'player'),
                    () => playTone(state.currentTarget, analyserTarget, 'target'));
  setupCheckMatch(() => {
    const match = state.playerParams.type === state.currentTarget.type ? 100 : 0;
    showScore(match, match === 100 ? 'You identified the waveform!' : `That was ${state.currentTarget.type}. Try again!`);
    if (match >= 80) completeLesson(1);
  });
}

function setupLesson2() {
  const lesson = LESSONS[1];
  state.currentTarget = lesson.targetGen();

  const slider = document.getElementById('freqSlider');
  const val = document.getElementById('freqVal');
  slider.addEventListener('input', () => {
    const f = parseFloat(slider.value);
    state.playerParams.freq = f;
    val.textContent = Math.round(f) + ' Hz';
  });

  setupPlayButtons(() => playTone(state.playerParams, analyserPlayer, 'player'),
                    () => playTone(state.currentTarget, analyserTarget, 'target'));
  setupCheckMatch(() => {
    const diff = Math.abs(state.playerParams.freq - state.currentTarget.freq);
    const maxDiff = 400;
    const match = Math.max(0, Math.round((1 - diff / maxDiff) * 100));
    let msg = match >= 90 ? `Nailed it! Target was ${Math.round(state.currentTarget.freq)} Hz.`
            : match >= 60 ? `Close! Target was ${Math.round(state.currentTarget.freq)} Hz.`
            : `Target was ${Math.round(state.currentTarget.freq)} Hz. Keep tuning!`;
    showScore(match, msg);
    if (match >= 85) completeLesson(2);
  });
}

function setupLesson3() {
  const lesson = LESSONS[2];
  state.currentTarget = lesson.targetGen();

  ['atk','dec','sus','rel'].forEach(p => {
    const map = { atk: 'a', dec: 'd', sus: 's', rel: 'r' };
    const slider = document.getElementById(p + 'Slider');
    const val = document.getElementById(p + 'Val');
    slider.addEventListener('input', () => {
      const v = parseFloat(slider.value);
      state.playerParams.env[map[p]] = v;
      val.textContent = p === 'sus' ? v.toFixed(2) : v.toFixed(2) + 's';
      drawADSR();
    });
  });

  setupPlayButtons(() => playEnvelopedTone(state.playerParams, analyserPlayer, 'player'),
                    () => playEnvelopedTone(state.currentTarget, analyserTarget, 'target'));
  setupCheckMatch(() => {
    const t = state.currentTarget.env;
    const p = state.playerParams.env;
    const aDiff = Math.abs(t.a - p.a) / 1.5;
    const dDiff = Math.abs(t.d - p.d) / 1.5;
    const sDiff = Math.abs(t.s - p.s);
    const rDiff = Math.abs(t.r - p.r) / 2;
    const avgDiff = (aDiff + dDiff + sDiff + rDiff) / 4;
    const match = Math.max(0, Math.round((1 - avgDiff) * 100));
    let msg = match >= 85 ? `Great match! That was a "${state.currentTarget.env.name}" envelope.`
            : `Target was "${state.currentTarget.env.name}" (A:${t.a} D:${t.d} S:${t.s} R:${t.r}). Adjust and retry!`;
    showScore(match, msg);
    if (match >= 80) completeLesson(3);
  });

  setTimeout(drawADSR, 50);
}

function setupLesson4() {
  const lesson = LESSONS[3];
  state.currentTarget = lesson.targetGen();

  document.querySelectorAll('#filterButtons .wave-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#filterButtons .wave-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.playerParams.filter.type = btn.dataset.filter;
    });
  });

  const cutoffSlider = document.getElementById('cutoffSlider');
  const cutoffVal = document.getElementById('cutoffVal');
  cutoffSlider.addEventListener('input', () => {
    const v = parseInt(cutoffSlider.value);
    state.playerParams.filter.cutoff = v;
    cutoffVal.textContent = v + ' Hz';
  });

  const qSlider = document.getElementById('qSlider');
  const qVal = document.getElementById('qVal');
  qSlider.addEventListener('input', () => {
    const v = parseFloat(qSlider.value);
    state.playerParams.filter.q = v;
    qVal.textContent = v.toFixed(1);
  });

  setupPlayButtons(() => playFilteredTone(state.playerParams, analyserPlayer, 'player'),
                    () => playFilteredTone(state.currentTarget, analyserTarget, 'target'));
  setupCheckMatch(() => {
    const t = state.currentTarget.filter;
    const p = state.playerParams.filter;
    const typeMatch = t.type === p.type ? 1 : 0;
    const cutoffDiff = Math.abs(Math.log2(t.cutoff) - Math.log2(p.cutoff)) / 6.5;
    const qDiff = Math.abs(t.q - p.q) / 20;
    const match = Math.max(0, Math.round((typeMatch * 0.4 + (1-cutoffDiff) * 0.35 + (1-qDiff) * 0.25) * 100));
    let msg = match >= 85 ? `Excellent! You matched the ${t.type} filter.`
            : `Target: ${t.type}, cutoff ${t.cutoff} Hz, Q ${t.q}. Keep adjusting!`;
    showScore(match, msg);
    if (match >= 80) completeLesson(4);
  });
}

function setupLesson5() {
  const lesson = LESSONS[4];
  state.currentTarget = lesson.targetGen();

  document.querySelectorAll('#lfoTargetBtns .wave-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#lfoTargetBtns .wave-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.playerParams.lfo.target = btn.dataset.lfo;
    });
  });

  const rateSlider = document.getElementById('lfoRateSlider');
  const rateVal = document.getElementById('lfoRateVal');
  rateSlider.addEventListener('input', () => {
    const v = parseFloat(rateSlider.value);
    state.playerParams.lfo.rate = v;
    rateVal.textContent = v.toFixed(1) + ' Hz';
  });

  const depthSlider = document.getElementById('lfoDepthSlider');
  const depthVal = document.getElementById('lfoDepthVal');
  depthSlider.addEventListener('input', () => {
    const v = parseFloat(depthSlider.value);
    state.playerParams.lfo.depth = v;
    depthVal.textContent = Math.round(v * 100) + '%';
  });

  setupPlayButtons(() => playLFOTone(state.playerParams, analyserPlayer, 'player'),
                    () => playLFOTone(state.currentTarget, analyserTarget, 'target'));
  setupCheckMatch(() => {
    const t = state.currentTarget.lfo;
    const p = state.playerParams.lfo;
    const targetMatch = t.target === p.target ? 1 : 0;
    const rateDiff = Math.abs(t.rate - p.rate) / 15;
    const depthDiff = Math.abs(t.depth - p.depth);
    const match = Math.max(0, Math.round((targetMatch * 0.4 + (1-rateDiff) * 0.3 + (1-depthDiff) * 0.3) * 100));
    let msg = match >= 85 ? `You matched the ${t.target} modulation!`
            : `Target: ${t.target} at ${t.rate} Hz, ${Math.round(t.depth*100)}% depth.`;
    showScore(match, msg);
    if (match >= 80) completeLesson(5);
  });
}

function setupLesson6() {
  const lesson = LESSONS[5];
  state.currentTarget = lesson.targetGen();

  for (let i = 1; i <= 8; i++) {
    const slider = document.getElementById('h' + i);
    slider.addEventListener('input', () => {
      state.playerParams.harmonics[i-1] = parseFloat(slider.value);
    });
  }

  setupPlayButtons(() => playAdditiveSound(state.playerParams, analyserPlayer, 'player'),
                    () => playAdditiveSound(state.currentTarget, analyserTarget, 'target'));
  setupCheckMatch(() => {
    const t = state.currentTarget.harmonics;
    const p = state.playerParams.harmonics;
    let totalDiff = 0;
    for (let i = 0; i < 8; i++) totalDiff += Math.abs(t[i] - p[i]);
    const match = Math.max(0, Math.round((1 - totalDiff / 8) * 100));
    let msg = match >= 85 ? `Great match! That was a "${state.currentTarget.name}" timbre.`
            : `Target: "${state.currentTarget.name}". Keep adjusting the harmonics!`;

    if (match >= 80) completeLesson(6);
  });
}

// ─── ADSR Drawing ───────────────────────────────────────────────────────────

function drawADSR() {
  const canvas = document.getElementById('adsrCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = canvas.offsetHeight * dpr;
  ctx.scale(dpr, dpr);
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  const env = state.playerParams.env;
  const pad = 10;

  ctx.clearRect(0, 0, w, h);

  const totalTime = env.a + env.d + 0.4 + env.r;
  const scale = (w - pad * 2) / totalTime;

  const aX = pad + env.a * scale;
  const dX = aX + env.d * scale;
  const sX = dX + 0.4 * scale;
  const rX = sX + env.r * scale;

  ctx.beginPath();
  ctx.moveTo(pad, h - pad);
  ctx.lineTo(aX, pad);
  ctx.lineTo(dX, pad + (1 - env.s) * (h - pad * 2));
  ctx.lineTo(sX, pad + (1 - env.s) * (h - pad * 2));
  ctx.lineTo(rX, h - pad);
  ctx.strokeStyle = '#0078d4';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Fill
  ctx.lineTo(pad, h - pad);
  ctx.closePath();
  ctx.fillStyle = 'rgba(0, 120, 212, 0.08)';
  ctx.fill();

  // Labels
  ctx.fillStyle = '#7a8fa5';
  ctx.font = '10px IBM Plex Mono';
  ctx.textAlign = 'center';
  ctx.fillText('A', (pad + aX) / 2, h - 2);
  ctx.fillText('D', (aX + dX) / 2, h - 2);
  ctx.fillText('S', (dX + sX) / 2, h - 2);
  ctx.fillText('R', (sX + rX) / 2, h - 2);
}

// ─── Audio Synthesis ────────────────────────────────────────────────────────

function stopAll() {
  ['player', 'target'].forEach(key => {
    const nodes = key === 'player' ? playerNodes : targetNodes;
    if (nodes.osc) { try { nodes.osc.stop(); } catch(e) {} }
    if (nodes.oscs) { nodes.oscs.forEach(o => { try { o.stop(); } catch(e) {} }); }
    if (nodes.lfo) { try { nodes.lfo.stop(); } catch(e) {} }
    if (nodes.timeout) clearTimeout(nodes.timeout);
  });
  playerNodes = {};
  targetNodes = {};
  isPlayerPlaying = false;
  isTargetPlaying = false;
}

function playTone(params, analyser, key, duration) {
  duration = duration || 1.5;
  const nodes = key === 'player' ? playerNodes : targetNodes;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = params.type;
  osc.frequency.value = params.freq;
  gain.gain.value = 0.4;
  osc.connect(gain);
  gain.connect(analyser);
  osc.start();
  nodes.osc = osc;
  nodes.gain = gain;
  if (key === 'player') isPlayerPlaying = true;
  else isTargetPlaying = true;
  nodes.timeout = setTimeout(() => {
    gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.05);
    setTimeout(() => { try { osc.stop(); } catch(e) {} }, 60);
    if (key === 'player') isPlayerPlaying = false;
    else isTargetPlaying = false;
  }, duration * 1000);
}

function playEnvelopedTone(params, analyser, key) {
  const nodes = key === 'player' ? playerNodes : targetNodes;
  const env = params.env;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.type = params.type;
  osc.frequency.value = params.freq;

  const now = actx.currentTime;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.45, now + env.a);
  gain.gain.linearRampToValueAtTime(env.s * 0.45, now + env.a + env.d);
  gain.gain.setValueAtTime(env.s * 0.45, now + env.a + env.d + 0.4);
  gain.gain.linearRampToValueAtTime(0, now + env.a + env.d + 0.4 + env.r);

  osc.connect(gain);
  gain.connect(analyser);
  osc.start();
  nodes.osc = osc;
  nodes.gain = gain;
  if (key === 'player') isPlayerPlaying = true;
  else isTargetPlaying = true;

  const total = env.a + env.d + 0.4 + env.r + 0.05;
  nodes.timeout = setTimeout(() => {
    try { osc.stop(); } catch(e) {}
    if (key === 'player') isPlayerPlaying = false;
    else isTargetPlaying = false;
  }, total * 1000);
}

function playFilteredTone(params, analyser, key) {
  const nodes = key === 'player' ? playerNodes : targetNodes;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  const filter = actx.createBiquadFilter();
  osc.type = params.type;
  osc.frequency.value = params.freq;
  gain.gain.value = 0.4;
  filter.type = params.filter.type;
  filter.frequency.value = params.filter.cutoff;
  filter.Q.value = params.filter.q;

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(analyser);
  osc.start();
  nodes.osc = osc;
  nodes.gain = gain;
  nodes.filter = filter;
  if (key === 'player') isPlayerPlaying = true;
  else isTargetPlaying = true;

  nodes.timeout = setTimeout(() => {
    gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.05);
    setTimeout(() => { try { osc.stop(); } catch(e) {} }, 60);
    if (key === 'player') isPlayerPlaying = false;
    else isTargetPlaying = false;
  }, 2000);
}

function playLFOTone(params, analyser, key) {
  const nodes = key === 'player' ? playerNodes : targetNodes;
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  const filter = actx.createBiquadFilter();
  osc.type = params.type;
  osc.frequency.value = params.freq;
  gain.gain.value = 0.4;
  filter.type = params.filter.type;
  filter.frequency.value = params.filter.cutoff;
  filter.Q.value = params.filter.q;

  const lfo = actx.createOscillator();
  const lfoGain = actx.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = params.lfo.rate;

  if (params.lfo.target === 'pitch') {
    lfoGain.gain.value = params.freq * params.lfo.depth * 0.1;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
  } else if (params.lfo.target === 'amplitude') {
    lfoGain.gain.value = params.lfo.depth * 0.4;
    lfo.connect(lfoGain);
    lfoGain.connect(gain.gain);
  } else if (params.lfo.target === 'filter') {
    lfoGain.gain.value = params.filter.cutoff * params.lfo.depth;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);
  }

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(analyser);
  lfo.start();
  osc.start();
  nodes.osc = osc;
  nodes.lfo = lfo;
  nodes.gain = gain;
  if (key === 'player') isPlayerPlaying = true;
  else isTargetPlaying = true;

  nodes.timeout = setTimeout(() => {
    gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.05);
    setTimeout(() => {
      try { osc.stop(); } catch(e) {}
      try { lfo.stop(); } catch(e) {}
    }, 60);
    if (key === 'player') isPlayerPlaying = false;
    else isTargetPlaying = false;
  }, 2500);
}

function playAdditiveSound(params, analyser, key) {
  const nodes = key === 'player' ? playerNodes : targetNodes;
  const gain = actx.createGain();
  gain.gain.value = 0.3;
  gain.connect(analyser);
  const oscs = [];

  for (let i = 0; i < 8; i++) {
    if (params.harmonics[i] <= 0.01) continue;
    const osc = actx.createOscillator();
    const hGain = actx.createGain();
    osc.type = 'sine';
    osc.frequency.value = params.freq * (i + 1);
    hGain.gain.value = params.harmonics[i] * 0.4;
    osc.connect(hGain);
    hGain.connect(gain);
    osc.start();
    oscs.push(osc);
  }

  nodes.oscs = oscs;
  nodes.gain = gain;
  if (key === 'player') isPlayerPlaying = true;
  else isTargetPlaying = true;

  nodes.timeout = setTimeout(() => {
    gain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.05);
    setTimeout(() => { oscs.forEach(o => { try { o.stop(); } catch(e) {} }); }, 60);
    if (key === 'player') isPlayerPlaying = false;
    else isTargetPlaying = false;
  }, 2000);
}

function playEffectedTone(params, analyser, key) {
  const nodes = key === 'player' ? playerNodes : targetNodes;
  const osc = actx.createOscillator();
  osc.type = params.type;
  osc.frequency.value = params.freq;

  const dryGain = actx.createGain();
  const wetGain = actx.createGain();
  const masterGainNode = actx.createGain();
  masterGainNode.gain.value = 0.35;

  // Delay
  const delay = actx.createDelay(1.0);
  const feedbackGain = actx.createGain();
  delay.delayTime.value = params.effects.delay.time;
  feedbackGain.gain.value = params.effects.delay.feedback;

  const delayMix = params.effects.delay.mix;
  dryGain.gain.value = 1 - delayMix * 0.5;
  wetGain.gain.value = delayMix;

  // Distortion
  const distortion = actx.createWaveShaper();
  const distAmount = params.effects.distortion.amount;
  const distMix = params.effects.distortion.mix;
  if (distAmount > 0 && distMix > 0) {
    const samples = 44100;
    const curve = new Float32Array(samples);
    for (let i = 0; i < samples; i++) {
      const x = (i * 2) / samples - 1;
      curve[i] = ((3 + distAmount) * x * 20 * (Math.PI/180)) / (Math.PI + distAmount * Math.abs(x));
    }
    distortion.curve = curve;
    distortion.oversample = '4x';
  }

  const distDryGain = actx.createGain();
  const distWetGain = actx.createGain();
  distDryGain.gain.value = 1 - distMix;
  distWetGain.gain.value = distMix;

  // Routing
  osc.connect(distDryGain);
  osc.connect(distortion);
  distortion.connect(distWetGain);

  distDryGain.connect(dryGain);
  distWetGain.connect(dryGain);
  distDryGain.connect(delay);
  distWetGain.connect(delay);

  delay.connect(feedbackGain);
  feedbackGain.connect(delay);
  delay.connect(wetGain);

  dryGain.connect(masterGainNode);
  wetGain.connect(masterGainNode);
  masterGainNode.connect(analyser);

  osc.start();
  nodes.osc = osc;
  nodes.gain = masterGainNode;
  if (key === 'player') isPlayerPlaying = true;
  else isTargetPlaying = true;

  nodes.timeout = setTimeout(() => {
    masterGainNode.gain.linearRampToValueAtTime(0, actx.currentTime + 0.1);
    setTimeout(() => { try { osc.stop(); } catch(e) {} }, 120);
    if (key === 'player') isPlayerPlaying = false;
    else isTargetPlaying = false;
  }, 2000);
}

function playFullSynthSound(params, analyser, key) {
  const nodes = key === 'player' ? playerNodes : targetNodes;
  const env = params.env;

  const osc = actx.createOscillator();
  osc.type = params.type;
  osc.frequency.value = params.freq;

  // Envelope gain
  const envGain = actx.createGain();
  const now = actx.currentTime;
  envGain.gain.setValueAtTime(0, now);
  envGain.gain.linearRampToValueAtTime(0.45, now + env.a);
  envGain.gain.linearRampToValueAtTime(env.s * 0.45, now + env.a + env.d);
  envGain.gain.setValueAtTime(env.s * 0.45, now + env.a + env.d + 0.5);
  envGain.gain.linearRampToValueAtTime(0, now + env.a + env.d + 0.5 + env.r);

  // Filter
  const filter = actx.createBiquadFilter();
  filter.type = params.filter.type || 'lowpass';
  filter.frequency.value = params.filter.cutoff;
  filter.Q.value = params.filter.q;

  // LFO
  let lfo, lfoGain;
  if (params.lfo.rate > 0 && params.lfo.depth > 0) {
    lfo = actx.createOscillator();
    lfoGain = actx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = params.lfo.rate;

    if (params.lfo.target === 'pitch') {
      lfoGain.gain.value = params.freq * params.lfo.depth * 0.1;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
    } else if (params.lfo.target === 'amplitude') {
      lfoGain.gain.value = params.lfo.depth * 0.4;
      lfo.connect(lfoGain);
      lfoGain.connect(envGain.gain);
    } else if (params.lfo.target === 'filter') {
      lfoGain.gain.value = params.filter.cutoff * params.lfo.depth;
      lfo.connect(lfoGain);
      lfoGain.connect(filter.frequency);
    }
    lfo.start();
    nodes.lfo = lfo;
  }

  // Delay effect
  const delay = actx.createDelay(1.0);
  const feedbackGain = actx.createGain();
  const dryGain = actx.createGain();
  const wetGain = actx.createGain();
  const masterGainNode = actx.createGain();
  masterGainNode.gain.value = 0.35;

  delay.delayTime.value = params.effects.delay.time;
  feedbackGain.gain.value = params.effects.delay.feedback;
  const delayMix = params.effects.delay.mix;
  dryGain.gain.value = 1 - delayMix * 0.5;
  wetGain.gain.value = delayMix;

  // Distortion
  const distortion = actx.createWaveShaper();
  const distAmount = params.effects.distortion.amount;
  const distMix = params.effects.distortion.mix || (distAmount > 0 ? 0.5 : 0);
  if (distAmount > 0 && distMix > 0) {
    const samples = 44100;
    const curve = new Float32Array(samples);
    for (let i = 0; i < samples; i++) {
      const x = (i * 2) / samples - 1;
      curve[i] = ((3 + distAmount) * x * 20 * (Math.PI/180)) / (Math.PI + distAmount * Math.abs(x));
    }
    distortion.curve = curve;
    distortion.oversample = '4x';
  }

  const distDryGain = actx.createGain();
  const distWetGain = actx.createGain();
  distDryGain.gain.value = 1 - distMix;
  distWetGain.gain.value = distMix;

  // Routing
  osc.connect(filter);
  filter.connect(envGain);

  envGain.connect(distDryGain);
  envGain.connect(distortion);
  distortion.connect(distWetGain);

  distDryGain.connect(dryGain);
  distWetGain.connect(dryGain);
  distDryGain.connect(delay);
  distWetGain.connect(delay);

  delay.connect(feedbackGain);
  feedbackGain.connect(delay);
  delay.connect(wetGain);

  dryGain.connect(masterGainNode);
  wetGain.connect(masterGainNode);
  masterGainNode.connect(analyser);

  osc.start();
  nodes.osc = osc;
  nodes.gain = masterGainNode;
  if (key === 'player') isPlayerPlaying = true;
  else isTargetPlaying = true;

  const total = env.a + env.d + 0.5 + env.r + 0.3;
  nodes.timeout = setTimeout(() => {
    masterGainNode.gain.linearRampToValueAtTime(0, actx.currentTime + 0.1);
    setTimeout(() => {
      try { osc.stop(); } catch(e) {}
      if (lfo) try { lfo.stop(); } catch(e) {}
    }, 120);
    if (key === 'player') isPlayerPlaying = false;
    else isTargetPlaying = false;
  }, Math.max(total, 1.5) * 1000);
}

// ─── Visualization ──────────────────────────────────────────────────────────

let animFrame = null;

function startVisualization() {
  if (animFrame) cancelAnimationFrame(animFrame);

  function draw() {
    drawWaveform('vizPlayer', analyserPlayer, isPlayerPlaying);
    drawWaveform('vizTarget', analyserTarget, isTargetPlaying);
    animFrame = requestAnimationFrame(draw);
  }
  draw();
}

function drawWaveform(canvasId, analyser, isPlaying) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !analyser) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  if (canvas.width !== canvas.offsetWidth * dpr || canvas.height !== canvas.offsetHeight * dpr) {
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = canvas.offsetHeight * dpr;
  }

  ctx.save();
  ctx.scale(dpr, dpr);
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;

  ctx.clearRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = 'rgba(0, 120, 212, 0.06)';
  ctx.lineWidth = 1;
  for (let y = h * 0.25; y < h; y += h * 0.25) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  // Center line
  ctx.strokeStyle = 'rgba(0, 120, 212, 0.12)';
  ctx.beginPath();
  ctx.moveTo(0, h / 2);
  ctx.lineTo(w, h / 2);
  ctx.stroke();

  if (!isPlaying) {
    ctx.fillStyle = '#b0c0d0';
    ctx.font = '11px IBM Plex Mono';
    ctx.textAlign = 'center';
    ctx.fillText('Press play to hear', w / 2, h / 2 + 4);
    ctx.restore();
    return;
  }

  const bufLen = analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(data);

  ctx.beginPath();
  ctx.strokeStyle = '#0078d4';
  ctx.lineWidth = 2;
  const sliceWidth = w / bufLen;
  let x = 0;
  for (let i = 0; i < bufLen; i++) {
    const v = data[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();

  // Glow
  ctx.strokeStyle = 'rgba(0, 120, 212, 0.15)';
  ctx.lineWidth = 6;
  ctx.beginPath();
  x = 0;
  for (let i = 0; i < bufLen; i++) {
    const v = data[i] / 128.0;
    const y = (v * h) / 2;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
    x += sliceWidth;
  }
  ctx.stroke();

  ctx.restore();
}

// ─── Init ───────────────────────────────────────────────────────────────────

renderNav();
renderLesson();

// Handle resize for ADSR
window.addEventListener('resize', () => {
  if (state.currentLesson === 3) drawADSR();
});

})();
</script>
