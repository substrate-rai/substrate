<script>
(function() {
'use strict';

// ══════════════════════════════════════════════════════════════
// TOKEN DATA
// ══════════════════════════════════════════════════════════════
var CATEGORIES = {
  keyword:  { label: 'Keyword',  color: '#0078D4', cssClass: 'bucket-keyword',  key: '1' },
  bug:      { label: 'Bug',      color: '#FF6B6B', cssClass: 'bucket-bug',      key: '2' },
  variable: { label: 'Variable', color: '#4CAF50', cssClass: 'bucket-variable', key: '3' },
  string:   { label: 'String',   color: '#FFB300', cssClass: 'bucket-string',   key: '4' },
  number:   { label: 'Number',   color: '#9C6ADE', cssClass: 'bucket-number',   key: '5' },
  operator: { label: 'Operator', color: '#00BCD4', cssClass: 'bucket-operator', key: '6' }
};

var TOKENS = {
  keyword:  ['if','else','for','while','return','function','const','let','import','class','try','catch','async','await','break','switch','case'],
  variable: ['data','count','result','items','user','config','buffer','state','cache','queue','node','path'],
  string:   ['"hello"','"error"','"loading"','\'OK\'','"404"','"done"','"null"','"true"','"for"','"while"','"class"','"let"'],
  bug:      ['whlie','fucntion','retrun','cosnt','improt','flase','Nulal','undefied','lenght','eles','funciton','reutrn','asynk','awiat','brak','swtich','clas'],
  number:   ['42','0','255','1024','3.14','0xFF','100','-1','99','0b1010','1e6','512'],
  operator: ['===','!==','>=','=>','&&','||','++','**','...','??','<=','!=','>>=','<<=']
};

// Level config: which categories are active
var LEVEL_CONFIG = [
  // Levels 1-5: 2 categories (keyword, bug), colored, slow
  { cats: ['keyword','bug'], colored: true,  speedMul: 0.6 },
  { cats: ['keyword','bug'], colored: true,  speedMul: 0.65 },
  { cats: ['keyword','bug'], colored: true,  speedMul: 0.7 },
  { cats: ['keyword','bug'], colored: true,  speedMul: 0.75 },
  { cats: ['keyword','bug'], colored: true,  speedMul: 0.8 },
  // Levels 6-10: 3 categories, colors fading
  { cats: ['keyword','bug','variable'], colored: true,  speedMul: 0.8 },
  { cats: ['keyword','bug','variable'], colored: true,  speedMul: 0.85 },
  { cats: ['keyword','bug','variable'], colored: 'fade', speedMul: 0.9 },
  { cats: ['keyword','bug','variable'], colored: 'fade', speedMul: 0.95 },
  { cats: ['keyword','bug','variable'], colored: false, speedMul: 1.0 },
  // Levels 11-15: 4 categories, no color
  { cats: ['keyword','bug','variable','string'], colored: false, speedMul: 1.0 },
  { cats: ['keyword','bug','variable','string'], colored: false, speedMul: 1.05 },
  { cats: ['keyword','bug','variable','string'], colored: false, speedMul: 1.1 },
  { cats: ['keyword','bug','variable','string'], colored: false, speedMul: 1.15 },
  { cats: ['keyword','bug','variable','string'], colored: false, speedMul: 1.2 },
  // Levels 16-20: 5 categories, faster
  { cats: ['keyword','bug','variable','string','number'], colored: false, speedMul: 1.25 },
  { cats: ['keyword','bug','variable','string','number'], colored: false, speedMul: 1.35 },
  { cats: ['keyword','bug','variable','string','number'], colored: false, speedMul: 1.45 },
  { cats: ['keyword','bug','variable','string','number'], colored: false, speedMul: 1.55 },
  { cats: ['keyword','bug','variable','string','number'], colored: false, speedMul: 1.65 },
  // Level 21+: all 6, rapid — extrapolated in getLevelConfig()
];

function getLevelConfig(level) {
  var idx = Math.min(level - 1, LEVEL_CONFIG.length - 1);
  var cfg = LEVEL_CONFIG[idx];
  if (level > LEVEL_CONFIG.length) {
    // Extrapolate: all 6 categories, speed keeps climbing
    return {
      cats: ['keyword','bug','variable','string','number','operator'],
      colored: false,
      speedMul: 1.65 + (level - LEVEL_CONFIG.length) * 0.1
    };
  }
  return cfg;
}

// ══════════════════════════════════════════════════════════════
// AUDIO (simple AudioContext tones)
// ══════════════════════════════════════════════════════════════
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, duration, type, vol) {
  if (!audioCtx) return;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (duration || 0.15));
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + (duration || 0.15));
  } catch(e) {}
}
function sfxCorrect() { playTone(660, 0.1, 'sine', 0.1); setTimeout(function() { playTone(880, 0.1, 'sine', 0.08); }, 60); }
function sfxWrong()   { playTone(200, 0.2, 'square', 0.1); }
function sfxLevelUp() { playTone(523, 0.1, 'sine', 0.1); setTimeout(function() { playTone(659, 0.1, 'sine', 0.1); }, 80); setTimeout(function() { playTone(784, 0.15, 'sine', 0.1); }, 160); }
function sfxGameOver(){ playTone(400, 0.15, 'square', 0.1); setTimeout(function() { playTone(300, 0.15, 'square', 0.1); }, 120); setTimeout(function() { playTone(200, 0.3, 'square', 0.12); }, 240); }

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
var STATE_TITLE = 0, STATE_PLAYING = 1, STATE_OVER = 2;
var gameState = STATE_TITLE;

var score, combo, maxCombo, hearts, level, tokensCorrect, tokensTotal;
var tpm, tpmStartTime, tpmTokenCount;
var tokens, nextSpawnTime, baseSpeed;
var activeCats, levelConfig;
var catStats; // { category: { correct, total } }
var scoreForNextHeart;
var flashEffects; // visual feedback

// DOM refs
var canvas, ctx, canvasWrap;
var hudHearts, hudScore, hudCombo, hudLevel, hudTpm;
var bucketsDiv, footerBest, footerAccuracy;

// Canvas sizing
var cw, ch;
var dpr;

// Sort zone: where the active token sits
var SORT_ZONE_X_RATIO = 0.22; // 22% from left
var sortZoneX;

// Token geometry
var TOKEN_HEIGHT = 36;
var TOKEN_PAD = 14;

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
function init() {
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');
  canvasWrap = document.getElementById('canvas-wrap');
  hudHearts = document.getElementById('hearts');
  hudScore = document.getElementById('score-display');
  hudCombo = document.getElementById('combo-display');
  hudLevel = document.getElementById('level-display');
  hudTpm = document.getElementById('tpm-display');
  bucketsDiv = document.getElementById('buckets');
  footerBest = document.getElementById('footer-best');
  footerAccuracy = document.getElementById('footer-accuracy');

  window.addEventListener('resize', resize);
  resize();

  // Keyboard
  document.addEventListener('keydown', onKeyDown);

  // Load bests
  updateFooter();

  showTitleScreen();
  requestAnimationFrame(loop);
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  var rect = canvasWrap.getBoundingClientRect();
  cw = rect.width;
  ch = rect.height;
  canvas.width = cw * dpr;
  canvas.height = ch * dpr;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  sortZoneX = cw * SORT_ZONE_X_RATIO;
}

// ══════════════════════════════════════════════════════════════
// TITLE SCREEN
// ══════════════════════════════════════════════════════════════
function showTitleScreen() {
  gameState = STATE_TITLE;
  removeOverlays();
  bucketsDiv.innerHTML = '';
  document.getElementById('hud').style.visibility = 'hidden';
  document.getElementById('footer-bar').style.visibility = 'hidden';

  var bestScore = loadBest('pipeline-best-score');
  var bestTpm = loadBest('pipeline-best-tpm');
  var bestLevel = loadBest('pipeline-best-level');
  var gamesPlayed = loadBest('pipeline-games-played');

  var overlay = document.createElement('div');
  overlay.className = 'screen-overlay';
  overlay.id = 'screen-overlay';
  overlay.innerHTML =
    '<div class="screen-panel glass">' +
      '<h1>PIPELINE</h1>' +
      '<p class="tagline">Code tokens. Sort fast. Catch bugs.</p>' +
      (gamesPlayed > 0 ?
        '<div class="stats">' +
          '<div><span class="label">Best Score</span><span class="value">' + bestScore + '</span></div>' +
          '<div><span class="label">Best TPM</span><span class="value">' + bestTpm + '</span></div>' +
          '<div><span class="label">Best Level</span><span class="value">' + bestLevel + '</span></div>' +
          '<div><span class="label">Games Played</span><span class="value">' + gamesPlayed + '</span></div>' +
        '</div>'
      : '<p style="font-size:0.8rem;color:#5A6B7F;margin:12px 0;">Sort tokens into the right buckets.<br>Keyboard: 1-6 &nbsp; Mobile: tap buckets</p>') +
      '<button class="play-btn" id="btn-start">PARSE</button>' +
    '</div>';

  document.getElementById('game-container').appendChild(overlay);
  document.getElementById('btn-start').addEventListener('click', startGame);
}

// ══════════════════════════════════════════════════════════════
// GAME OVER SCREEN
// ══════════════════════════════════════════════════════════════
function showGameOverScreen() {
  gameState = STATE_OVER;
  sfxGameOver();
  removeOverlays();

  var accuracy = tokensTotal > 0 ? Math.round((tokensCorrect / tokensTotal) * 100) : 0;
  var finalTpm = calcTpm();

  // Save bests
  saveBest('pipeline-best-score', score);
  saveBest('pipeline-best-tpm', finalTpm);
  saveBest('pipeline-best-level', level);
  incrementStat('pipeline-games-played');

  // Category breakdown
  var breakdownHtml = '<table class="breakdown-table"><tr><th>Category</th><th>Accuracy</th></tr>';
  var allCats = ['keyword','bug','variable','string','number','operator'];
  for (var i = 0; i < allCats.length; i++) {
    var c = allCats[i];
    if (catStats[c] && catStats[c].total > 0) {
      var pct = Math.round((catStats[c].correct / catStats[c].total) * 100);
      breakdownHtml +=
        '<tr><td><span class="cat-dot" style="background:' + CATEGORIES[c].color + '"></span>' +
        CATEGORIES[c].label + '</td><td style="text-align:right;font-weight:600">' + pct + '%</td></tr>';
    }
  }
  breakdownHtml += '</table>';

  var isNewBestScore = score === loadBest('pipeline-best-score');
  var isNewBestTpm = finalTpm === loadBest('pipeline-best-tpm');

  var overlay = document.createElement('div');
  overlay.className = 'screen-overlay';
  overlay.id = 'screen-overlay';
  overlay.innerHTML =
    '<div class="screen-panel glass">' +
      '<h1>GAME OVER</h1>' +
      '<div class="stats">' +
        '<div><span class="label">Score</span><span class="value">' + score + (isNewBestScore ? ' <span class="best-label">BEST</span>' : '') + '</span></div>' +
        '<div><span class="label">Level</span><span class="value">' + level + '</span></div>' +
        '<div><span class="label">TPM</span><span class="value">' + finalTpm + (isNewBestTpm ? ' <span class="best-label">BEST</span>' : '') + '</span></div>' +
        '<div><span class="label">Accuracy</span><span class="value">' + accuracy + '%</span></div>' +
        '<div><span class="label">Combo Peak</span><span class="value">x' + maxCombo + '</span></div>' +
      '</div>' +
      breakdownHtml +
      '<button class="play-btn" id="btn-restart">PARSE AGAIN</button>' +
    '</div>';

  document.getElementById('game-container').appendChild(overlay);
  document.getElementById('btn-restart').addEventListener('click', startGame);

  updateFooter();
}

function removeOverlays() {
  var el = document.getElementById('screen-overlay');
  if (el) el.remove();
}

// ══════════════════════════════════════════════════════════════
// START / RESET
// ══════════════════════════════════════════════════════════════
function startGame() {
  ensureAudio();
  removeOverlays();

  score = 0;
  combo = 1;
  maxCombo = 1;
  hearts = 3;
  level = 1;
  tokensCorrect = 0;
  tokensTotal = 0;
  tpmStartTime = performance.now();
  tpmTokenCount = 0;
  tokens = [];
  flashEffects = [];
  nextSpawnTime = 0;
  scoreForNextHeart = 500;
  catStats = {};

  levelConfig = getLevelConfig(1);
  activeCats = levelConfig.cats;
  baseSpeed = 60 * levelConfig.speedMul; // pixels per second

  document.getElementById('hud').style.visibility = 'visible';
  document.getElementById('footer-bar').style.visibility = 'visible';

  buildBuckets();
  updateHUD();

  gameState = STATE_PLAYING;
}

// ══════════════════════════════════════════════════════════════
// BUCKETS
// ══════════════════════════════════════════════════════════════
function buildBuckets() {
  bucketsDiv.innerHTML = '';
  for (var i = 0; i < activeCats.length; i++) {
    var cat = activeCats[i];
    var info = CATEGORIES[cat];
    var btn = document.createElement('button');
    btn.className = 'bucket-btn ' + info.cssClass;
    btn.setAttribute('data-cat', cat);
    btn.innerHTML = info.label + '<span class="key-hint">[' + info.key + ']</span>';
    btn.addEventListener('click', (function(c) { return function() { sortToken(c); }; })(cat));
    // Touch feedback
    btn.addEventListener('touchstart', function(e) { this.classList.add('pressed'); }, { passive: true });
    btn.addEventListener('touchend', function(e) { this.classList.remove('pressed'); }, { passive: true });
    bucketsDiv.appendChild(btn);
  }
}

// ══════════════════════════════════════════════════════════════
// TOKEN SPAWNING
// ══════════════════════════════════════════════════════════════
function pickRandomToken() {
  var cat = activeCats[Math.floor(Math.random() * activeCats.length)];
  var pool = TOKENS[cat];
  var text = pool[Math.floor(Math.random() * pool.length)];
  return { text: text, category: cat };
}

function spawnToken(now) {
  var tok = pickRandomToken();
  var catInfo = CATEGORIES[tok.category];
  var colored = levelConfig.colored;

  var tokenColor;
  if (colored === true) {
    tokenColor = catInfo.color;
  } else if (colored === 'fade') {
    // Blend toward neutral gray
    tokenColor = blendColor(catInfo.color, '#5A6B7F', 0.55);
  } else {
    tokenColor = '#2D3748';
  }

  tokens.push({
    text: tok.text,
    category: tok.category,
    x: cw + 20,
    color: tokenColor,
    alpha: 1,
    width: measureTokenWidth(tok.text) + TOKEN_PAD * 2,
    dying: false,
    dyingTimer: 0,
    sorted: false
  });
}

function measureTokenWidth(text) {
  ctx.font = '600 16px "IBM Plex Mono", monospace';
  return ctx.measureText(text).width;
}

function getSpawnInterval() {
  // Time between token spawns in ms — decreases with level
  var base = 2200;
  var min = 600;
  var interval = base / levelConfig.speedMul;
  return Math.max(min, interval);
}

// ══════════════════════════════════════════════════════════════
// SORTING LOGIC
// ══════════════════════════════════════════════════════════════
function getActiveToken() {
  // The frontmost token (closest to or past the sort zone) that hasn't been sorted
  var best = null;
  for (var i = 0; i < tokens.length; i++) {
    var t = tokens[i];
    if (t.sorted || t.dying) continue;
    if (t.x <= sortZoneX + t.width * 0.5) {
      if (!best || t.x < best.x) best = t;
    }
  }
  return best;
}

function sortToken(chosenCat) {
  if (gameState !== STATE_PLAYING) return;
  ensureAudio();

  var tok = getActiveToken();
  if (!tok) return;

  tok.sorted = true;
  tokensTotal++;

  // Init cat stats
  if (!catStats[tok.category]) catStats[tok.category] = { correct: 0, total: 0 };
  catStats[tok.category].total++;

  if (chosenCat === tok.category) {
    // Correct!
    tokensCorrect++;
    tpmTokenCount++;
    catStats[tok.category].correct++;

    var points = 10 * combo;
    score += points;
    combo = Math.min(combo + 1, 4);
    if (combo > maxCombo) maxCombo = combo;

    sfxCorrect();
    addFlash(tok.x, getTokenY(), CATEGORIES[tok.category].color, '+' + points);
    tok.dying = true; // fade out upward
    tok.dyingDir = -1; // upward

    // Heart recovery
    if (score >= scoreForNextHeart && hearts < 3) {
      hearts++;
      scoreForNextHeart += 500;
    }

    // Level up check: every 15 correct sorts
    if (tokensCorrect > 0 && tokensCorrect % 15 === 0) {
      levelUp();
    }
  } else {
    // Wrong!
    combo = 1;
    hearts--;

    sfxWrong();
    addFlash(tok.x, getTokenY(), '#FF6B6B', 'MISS');
    tok.dying = true;
    tok.dyingDir = 1; // downward

    if (hearts <= 0) {
      showGameOverScreen();
      return;
    }
  }

  // Flash the selected bucket
  flashBucket(chosenCat, chosenCat === tok.category);
  updateHUD();
}

function levelUp() {
  level++;
  levelConfig = getLevelConfig(level);
  baseSpeed = 60 * levelConfig.speedMul;

  var newCats = levelConfig.cats;
  if (newCats.length !== activeCats.length || newCats.join(',') !== activeCats.join(',')) {
    activeCats = newCats;
    buildBuckets();
  }

  sfxLevelUp();
}

function flashBucket(cat, correct) {
  var btns = bucketsDiv.querySelectorAll('.bucket-btn');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('data-cat') === cat) {
      var btn = btns[i];
      var origBg = btn.style.background;
      btn.style.boxShadow = correct
        ? '0 0 20px rgba(76,175,80,0.6), 0 3px 12px rgba(0,0,0,0.1)'
        : '0 0 20px rgba(255,107,107,0.6), 0 3px 12px rgba(0,0,0,0.1)';
      setTimeout(function() {
        btn.style.boxShadow = '';
      }, 200);
      break;
    }
  }
}

// ══════════════════════════════════════════════════════════════
// FLASH EFFECTS
// ══════════════════════════════════════════════════════════════
function addFlash(x, y, color, text) {
  flashEffects.push({
    x: x, y: y,
    color: color,
    text: text,
    alpha: 1,
    vy: -1.5,
    life: 0.6
  });
}

function updateFlashes(dt) {
  for (var i = flashEffects.length - 1; i >= 0; i--) {
    var f = flashEffects[i];
    f.life -= dt;
    f.y += f.vy * 60 * dt;
    f.alpha = Math.max(0, f.life / 0.6);
    if (f.life <= 0) flashEffects.splice(i, 1);
  }
}

function drawFlashes() {
  for (var i = 0; i < flashEffects.length; i++) {
    var f = flashEffects[i];
    ctx.save();
    ctx.globalAlpha = f.alpha;
    ctx.font = '700 14px "IBM Plex Mono", monospace';
    ctx.fillStyle = f.color;
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════════════════
// HUD
// ══════════════════════════════════════════════════════════════
function updateHUD() {
  var heartStr = '';
  for (var i = 0; i < 3; i++) {
    heartStr += i < hearts ? '\u2665' : '\u2661';
  }
  hudHearts.textContent = heartStr;
  hudScore.textContent = 'SCORE: ' + score;
  hudCombo.textContent = 'x' + combo;
  hudCombo.style.color = combo >= 4 ? '#FFB300' : combo >= 3 ? '#4CAF50' : combo >= 2 ? '#0078D4' : '#5A6B7F';
  hudLevel.textContent = 'Level ' + level;
  hudTpm.textContent = 'TPM: ' + calcTpm();
}

function calcTpm() {
  var elapsed = (performance.now() - tpmStartTime) / 60000; // in minutes
  if (elapsed < 0.05) return 0;
  return Math.round(tpmTokenCount / elapsed);
}

function updateFooter() {
  footerBest.textContent = 'Best: ' + loadBest('pipeline-best-score');
  var acc = tokensTotal > 0 ? Math.round((tokensCorrect / tokensTotal) * 100) + '%' : '--%';
  footerAccuracy.textContent = 'Accuracy: ' + acc;
}

// ══════════════════════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════════════════════
function onKeyDown(e) {
  if (gameState === STATE_TITLE) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      startGame();
    }
    return;
  }
  if (gameState === STATE_OVER) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      startGame();
    }
    return;
  }
  if (gameState === STATE_PLAYING) {
    var keyNum = parseInt(e.key);
    if (keyNum >= 1 && keyNum <= 6) {
      e.preventDefault();
      // Map key to active category
      var idx = keyNum - 1;
      if (idx < activeCats.length) {
        sortToken(activeCats[idx]);
      }
    }
  }
}

// ══════════════════════════════════════════════════════════════
// RENDERING
// ══════════════════════════════════════════════════════════════
function getTokenY() {
  return ch * 0.42;
}

function getConveyorY() {
  return ch * 0.42 + TOKEN_HEIGHT * 0.5 + 6;
}

function drawConveyor() {
  var cy = getConveyorY();

  // Conveyor track
  ctx.save();

  // Track background
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  roundRect(ctx, 16, cy - 2, cw - 32, 8, 4);
  ctx.fill();

  // Track shine
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  roundRect(ctx, 16, cy - 2, cw - 32, 3, 2);
  ctx.fill();

  // Sort zone indicator
  var szW = 6;
  var szX = sortZoneX;
  var gradient = ctx.createLinearGradient(szX, cy - 60, szX, cy + 10);
  gradient.addColorStop(0, 'rgba(0,120,212,0)');
  gradient.addColorStop(0.4, 'rgba(0,120,212,0.08)');
  gradient.addColorStop(1, 'rgba(0,120,212,0.15)');
  ctx.fillStyle = gradient;
  ctx.fillRect(szX - 20, cy - 60, 40, 70);

  // Sort zone line
  ctx.strokeStyle = 'rgba(0,120,212,0.3)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(szX, cy - 55);
  ctx.lineTo(szX, cy + 4);
  ctx.stroke();
  ctx.setLineDash([]);

  // Sort zone arrow
  ctx.fillStyle = 'rgba(0,120,212,0.35)';
  ctx.beginPath();
  ctx.moveTo(szX - 6, cy + 6);
  ctx.lineTo(szX + 6, cy + 6);
  ctx.lineTo(szX, cy + 14);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawTokens() {
  var ty = getTokenY();

  for (var i = 0; i < tokens.length; i++) {
    var t = tokens[i];

    ctx.save();

    if (t.dying) {
      ctx.globalAlpha = t.alpha;
      var dyOffset = (1 - t.alpha) * 30 * t.dyingDir;
      ctx.translate(0, dyOffset);
    }

    var tx = t.x;
    var tw = t.width;
    var th = TOKEN_HEIGHT;
    var isInSortZone = !t.sorted && !t.dying && tx <= sortZoneX + tw * 0.5 && tx >= sortZoneX - tw * 1.2;

    // Token pill background
    if (isInSortZone) {
      // Highlighted
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.shadowColor = 'rgba(0,120,212,0.2)';
      ctx.shadowBlur = 12;
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.shadowColor = 'rgba(0,0,0,0.06)';
      ctx.shadowBlur = 6;
    }

    roundRect(ctx, tx - tw / 2, ty - th / 2, tw, th, 8);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Border
    ctx.strokeStyle = isInSortZone ? 'rgba(0,120,212,0.35)' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = isInSortZone ? 2 : 1;
    roundRect(ctx, tx - tw / 2, ty - th / 2, tw, th, 8);
    ctx.stroke();

    // Token text
    ctx.font = '600 16px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = t.color;
    ctx.fillText(t.text, tx, ty);

    ctx.restore();
  }
}

function drawBackground() {
  // Subtle grid lines for tech feel
  ctx.save();
  ctx.strokeStyle = 'rgba(0,120,212,0.03)';
  ctx.lineWidth = 1;
  var gridSize = 40;
  for (var x = 0; x < cw; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, ch);
    ctx.stroke();
  }
  for (var y = 0; y < ch; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(cw, y);
    ctx.stroke();
  }
  ctx.restore();
}

// ══════════════════════════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════════════════════════
var lastTime = 0;
function loop(timestamp) {
  var dt = lastTime ? (timestamp - lastTime) / 1000 : 0.016;
  dt = Math.min(dt, 0.05); // cap
  lastTime = timestamp;

  // Clear
  ctx.clearRect(0, 0, cw, ch);

  if (gameState === STATE_PLAYING) {
    updateGame(dt, timestamp);
    drawBackground();
    drawConveyor();
    drawTokens();
    drawFlashes();
    updateHUD();
    updateFooter();
  } else if (gameState === STATE_TITLE || gameState === STATE_OVER) {
    drawBackground();
    // Draw any remaining tokens for visual flair
    drawConveyor();
    drawTokens();
  }

  requestAnimationFrame(loop);
}

function updateGame(dt, now) {
  // Spawn tokens
  if (now >= nextSpawnTime) {
    spawnToken(now);
    nextSpawnTime = now + getSpawnInterval();
  }

  // Move tokens
  var speed = baseSpeed * dt;
  for (var i = tokens.length - 1; i >= 0; i--) {
    var t = tokens[i];
    if (t.dying) {
      t.dyingTimer += dt;
      t.alpha = Math.max(0, 1 - t.dyingTimer / 0.35);
      if (t.alpha <= 0) {
        tokens.splice(i, 1);
      }
      continue;
    }
    t.x -= speed;

    // Token fell off the left edge without being sorted
    if (t.x < -t.width && !t.sorted) {
      t.sorted = true;
      tokensTotal++;
      combo = 1;
      hearts--;
      addFlash(40, getTokenY(), '#FF6B6B', 'MISSED');
      sfxWrong();

      if (!catStats[t.category]) catStats[t.category] = { correct: 0, total: 0 };
      catStats[t.category].total++;

      tokens.splice(i, 1);

      if (hearts <= 0) {
        updateHUD();
        showGameOverScreen();
        return;
      }
      updateHUD();
    }
  }

  // Clean up off-screen sorted tokens
  for (var j = tokens.length - 1; j >= 0; j--) {
    if (tokens[j].x < -tokens[j].width && tokens[j].sorted) {
      tokens.splice(j, 1);
    }
  }

  // Update flashes
  updateFlashes(dt);
}

// ══════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function blendColor(hex1, hex2, ratio) {
  var r1 = parseInt(hex1.slice(1,3), 16), g1 = parseInt(hex1.slice(3,5), 16), b1 = parseInt(hex1.slice(5,7), 16);
  var r2 = parseInt(hex2.slice(1,3), 16), g2 = parseInt(hex2.slice(3,5), 16), b2 = parseInt(hex2.slice(5,7), 16);
  var r = Math.round(r1 + (r2 - r1) * ratio);
  var g = Math.round(g1 + (g2 - g1) * ratio);
  var b = Math.round(b1 + (b2 - b1) * ratio);
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

// localStorage helpers
function loadBest(key) {
  try { return parseInt(localStorage.getItem(key)) || 0; } catch(e) { return 0; }
}

function saveBest(key, val) {
  try {
    var current = loadBest(key);
    if (val > current) localStorage.setItem(key, val);
  } catch(e) {}
}

function incrementStat(key) {
  try {
    var v = parseInt(localStorage.getItem(key)) || 0;
    localStorage.setItem(key, v + 1);
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
