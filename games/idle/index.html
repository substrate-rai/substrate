  /* CRT scanline overlay */

    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;

      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px

    pointer-events: none;
    z-index: 10000;

  /* Screen shake */
  .shake-1 { animation: shake1 0.15s ease-out; }
  .shake-2 { animation: shake2 0.25s ease-out; }
  .shake-3 { animation: shake3 0.35s ease-out; }

  @keyframes shake1 {
    0%, 100% { transform: translate(0); }
    25% { transform: translate(-2px, 1px); }
    50% { transform: translate(2px, -1px); }
    75% { transform: translate(-1px, 2px); }
  }
  @keyframes shake2 {
    0%, 100% { transform: translate(0); }
    15% { transform: translate(-4px, 2px); }
    30% { transform: translate(3px, -3px); }
    45% { transform: translate(-2px, 4px); }
    60% { transform: translate(4px, -1px); }
    75% { transform: translate(-3px, 2px); }
  }
  @keyframes shake3 {
    0%, 100% { transform: translate(0); }
    10% { transform: translate(-6px, 3px); }
    20% { transform: translate(5px, -5px); }
    30% { transform: translate(-3px, 6px); }
    40% { transform: translate(6px, -2px); }
    50% { transform: translate(-5px, 4px); }
    60% { transform: translate(4px, -6px); }
    70% { transform: translate(-6px, 2px); }
    80% { transform: translate(3px, -3px); }

<script>
(function() {
  'use strict';

  // ==================== AUDIO ENGINE ====================
  const Audio = (() => {
    let ctx = null;

    function getCtx() {
      if (!ctx) {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    function playTone(freq, duration, vol, type, decay) {
      try {
        const c = getCtx();
        const o = c.createOscillator();
        const g = c.createGain();
        o.type = type || 'sine';
        o.frequency.setValueAtTime(freq, c.currentTime);
        g.gain.setValueAtTime(vol || 0.08, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (decay || duration));
        o.connect(g);
        g.connect(c.destination);
        o.start(c.currentTime);
        o.stop(c.currentTime + duration);
      } catch(e) {}
    }

    return {
      click() {
        playTone(800, 0.06, 0.06, 'square', 0.06);
        playTone(1200, 0.04, 0.04, 'sine', 0.04);
      },
      purchase() {
        playTone(523, 0.1, 0.08, 'sine', 0.15);
        setTimeout(() => playTone(659, 0.1, 0.08, 'sine', 0.15), 50);
        setTimeout(() => playTone(784, 0.15, 0.06, 'sine', 0.2), 100);
      },
      milestone() {
        const notes = [523, 659, 784, 1047];
        notes.forEach((f, i) => {
          setTimeout(() => playTone(f, 0.2, 0.07, 'sine', 0.3), i * 80);
        });
      },
      upgrade() {
        playTone(440, 0.08, 0.06, 'square', 0.1);
        setTimeout(() => playTone(880, 0.12, 0.08, 'sine', 0.2), 60);
        setTimeout(() => playTone(1320, 0.15, 0.06, 'sine', 0.25), 120);
      },

  // ==================== PARTICLE SYSTEM ====================
  const Particles = (() => {
    const canvas = document.getElementById('particle-canvas');
    const pctx = canvas.getContext('2d');
    let particles = [];
    let dpr = window.devicePixelRatio || 1;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      pctx.scale(dpr, dpr);
    }

    window.addEventListener('resize', resize);
    resize();

    function spawn(x, y, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 40 + Math.random() * 120;
        const size = 2 + Math.random() * 3;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size,
          life: 1,
          decay: 1.5 + Math.random() * 1.5,
          hue: 155 + Math.random() * 30,
        });
      }
    }

    function spawnData(x, y) {
      for (let i = 0; i < 4; i++) {
        const chars = ['0', '1', '{', '}', '/', '>', '_', '*'];
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
        const speed = 30 + Math.random() * 50;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 10,
          life: 1,
          decay: 1.2 + Math.random(),
          text: chars[Math.floor(Math.random() * chars.length)],
          hue: 155,
        });
      }
    }

    function update(dt) {
      pctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= p.decay * dt;
        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 60 * dt; // gravity

        const alpha = Math.max(0, p.life);

        if (p.text) {
          pctx.font = `${p.size}px 'IBM Plex Mono', monospace`;
          pctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${alpha})`;
          pctx.fillText(p.text, p.x, p.y);
        } else {
          pctx.beginPath();
          pctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
          pctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${alpha})`;
          pctx.fill();
        }
      }
    }

    return { spawn, spawnData, update };
  })();

  // ==================== NUMBER FORMATTING ====================
  const SUFFIXES = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc'];

  function fmt(n) {
    if (n < 1000) return Math.floor(n).toLocaleString();
    const tier = Math.floor(Math.log10(Math.abs(n)) / 3);
    if (tier >= SUFFIXES.length) {
      const exp = Math.floor(Math.log10(Math.abs(n)));
      return (n / Math.pow(10, exp)).toFixed(2) + 'e' + exp;
    }
    const suffix = SUFFIXES[tier];
    const scale = Math.pow(10, tier * 3);
    const scaled = n / scale;
    return (scaled < 10 ? scaled.toFixed(2) : scaled < 100 ? scaled.toFixed(1) : Math.floor(scaled)) + suffix;
  }

  function fmtTime(seconds) {
    if (seconds < 60) return Math.floor(seconds) + 's';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + Math.floor(seconds % 60) + 's';
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    return h + 'h ' + m + 'm';
  }

      // Merge with defaults
      GENERATORS.forEach(g => { if (!(g.id in saved.generators)) saved.generators[g.id] = 0; });

      MILESTONES.forEach(m => { if (!(m.id in saved.milestones)) saved.milestones[m.id] = false; });

  // ==================== COST / CPS CALCULATIONS ====================
  function getGenCost(genDef, owned) {
    return Math.floor(genDef.baseCost * Math.pow(COST_MULTIPLIER, owned));
  }

  function getBulkCost(genDef, owned, count) {
    let total = 0;
    for (let i = 0; i < count; i++) {
      total += getGenCost(genDef, owned + i);
    }
    return total;
  }

  function getMaxBuyable(genDef, owned, budget) {
    let count = 0;
    let total = 0;
    while (true) {
      const next = getGenCost(genDef, owned + count);
      if (total + next > budget) break;
      total += next;
      count++;
      if (count > 10000) break; // safety
    }
    return { count, cost: total };
  }

  function getGenMultiplier(genId) {
    let mult = 1;
    UPGRADES.forEach(u => {
      if (state.upgrades[u.id] && (u.target === genId || u.target === 'all')) {
        mult *= u.mult;
      }
    });
    return mult;
  }

  function getGenCps(genDef) {
    return genDef.baseCps * getGenMultiplier(genDef.id);
  }

  function getTotalCps() {
    let total = 0;
    GENERATORS.forEach(g => {
      total += getGenCps(g) * state.generators[g.id];
    });
    return total;
  }

  }

  // ==================== RENDER GENERATORS ====================
  function renderGenerators() {
    const html = [];
    GENERATORS.forEach((g, idx) => {
      const owned = state.generators[g.id];
      const unlocked = state.totalCycles >= g.unlockAt || owned > 0;
      const nextUnlock = idx < GENERATORS.length - 1 ? GENERATORS[idx + 1] : null;

      // Show one tier ahead as locked hint
      if (!unlocked && idx > 0) {
        const prev = GENERATORS[idx - 1];
        const prevUnlocked = state.totalCycles >= prev.unlockAt || state.generators[prev.id] > 0;
        if (!prevUnlocked) return; // Don't show if previous isn't visible either
      }

      let displayCost, displayCount;
      if (buyAmount === 'max') {
        const maxInfo = getMaxBuyable(g, owned, state.cycles);
        displayCost = maxInfo.count > 0 ? maxInfo.cost : getGenCost(g, owned);
        displayCount = maxInfo.count > 0 ? maxInfo.count : 1;

        displayCost = getBulkCost(g, owned, buyAmount);
        displayCount = buyAmount;

      <div class="stat-row"><span class="stat-label">Upgrades Purchased</span><span class="stat-value">${totalUpgs} / ${UPGRADES.length}</span></div>
      <div class="stat-row"><span class="stat-label">Milestones Reached</span><span class="stat-value">${totalMs} / ${MILESTONES.length}</span></div>
      <div class="stat-row"><span class="stat-label">Play Time</span><span class="stat-value">${fmtTime(elapsed)}</span></div>
    `;
  }

  // ==================== CHECK MILESTONES ====================
  let milestoneQueue = [];

  function checkMilestones() {
    MILESTONES.forEach(m => {
      if (!state.milestones[m.id] && state.totalCycles >= m.threshold) {
        state.milestones[m.id] = true;
        milestoneQueue.push(m);
      }
    });
  }

  function showNextMilestone() {
    if (milestoneQueue.length === 0) return;
    const m = milestoneQueue.shift();

    Audio.milestone();
    shake(2);

    document.getElementById('mp-name').textContent = m.name;
    document.getElementById('mp-desc').textContent = fmt(m.threshold) + ' total cycles';
    $milestonePopup.classList.add('show');

    if (m.id === 'ms1') { showFundPrompt(); }

    setTimeout(() => {
      $milestonePopup.classList.remove('show');
      // Show next queued milestone
      setTimeout(showNextMilestone, 200);
    }, 2000);
  }

  // ==================== BADGE NOTIFICATIONS ====================
  function updateBadges() {
    // Generator badge: if any generator is affordable
    const genBadge = document.getElementById('gen-badge');
    const anyGenAffordable = GENERATORS.some(g => {
      const unlocked = state.totalCycles >= g.unlockAt || state.generators[g.id] > 0;
      return unlocked && state.cycles >= getGenCost(g, state.generators[g.id]);
    });
    genBadge.classList.toggle('visible', anyGenAffordable && activeTab !== 'generators');

    // Upgrade badge: if any upgrade is affordable
    const upgBadge = document.getElementById('upg-badge');
    const anyUpgAffordable = UPGRADES.some(u => {
      return !state.upgrades[u.id] && state.generators[u.reqGen] >= u.reqCount && state.cycles >= u.cost;
    });
    upgBadge.classList.toggle('visible', anyUpgAffordable && activeTab !== 'upgrades');
  }

  // ==================== DISPLAY UPDATE ====================
  function updateDisplay() {
    $cycleCount.textContent = fmt(state.cycles);
    const cps = getTotalCps();
    $cpsDisplay.textContent = fmt(cps) + ' cycles/sec';
    updateBadges();
  }

  function renderCurrentTab() {
    switch (activeTab) {
      case 'generators': renderGenerators(); break;
      case 'upgrades': renderUpgrades(); break;
      case 'milestones': renderMilestones(); break;
      case 'stats': renderStats(); break;
    }
  }

  // ==================== GAME LOOP ====================
  let lastFrame = performance.now();
  let saveTimer = 0;
  let renderTimer = 0;
  let milestoneTimer = 0;
  let pulseTimer = 0;

  function gameLoop(now) {
    const dt = Math.min((now - lastFrame) / 1000, 0.1); // cap at 100ms
    lastFrame = now;

    // Earn cycles
    const cps = getTotalCps();
    if (cps > 0) {
      const earned = cps * dt;
      state.cycles += earned;
      state.totalCycles += earned;
    }

    // Update particles
    Particles.update(dt);

    // Update display (throttled to ~15fps for DOM updates)
    renderTimer += dt;
    if (renderTimer >= 0.066) {
      renderTimer = 0;
      updateDisplay();
    }

    // Re-render current tab periodically (for cost/affordability updates)
    saveTimer += dt;
    if (saveTimer >= 1) {
      saveTimer = 0;
      renderCurrentTab();
    }

    // Auto-save every 30 seconds
    if (now - state.lastSave > 30000) {
      save();
    }

    // Milestone popup queue
    milestoneTimer += dt;
    if (milestoneTimer >= 0.5 && milestoneQueue.length > 0 && !$milestonePopup.classList.contains('show')) {
      milestoneTimer = 0;
      showNextMilestone();
    }

    // Check milestones
    checkMilestones();

    // Pulse effect on cycle counter when earning fast
    pulseTimer += dt;
    if (pulseTimer >= 0.3) {
      pulseTimer = 0;
      $cycleCount.classList.toggle('pulse', cps > 100);
    }

    requestAnimationFrame(gameLoop);
  }

  // ==================== OFFLINE PROGRESS ====================
  function calculateOfflineProgress(savedState) {
    const elapsed = (Date.now() - savedState.lastSave) / 1000;
    if (elapsed < 10) return null; // Less than 10 seconds, skip

    // Calculate CPS at time of save
    let cps = 0;
    GENERATORS.forEach(g => {
      let mult = 1;
      UPGRADES.forEach(u => {
        if (savedState.upgrades[u.id] && (u.target === g.id || u.target === 'all')) {
          mult *= u.mult;
        }
      });
      cps += g.baseCps * mult * savedState.generators[g.id];
    });

    if (cps <= 0) return null;

    // Give 50% of what would have been earned (standard idle game convention)
    const maxOffline = 8 * 3600; // cap at 8 hours
    const effectiveTime = Math.min(elapsed, maxOffline);
    const earned = cps * effectiveTime * 0.5;

    return { earned, elapsed: effectiveTime };
  }

  function showOfflineProgress(earned, elapsed) {
    document.getElementById('op-amount').textContent = '+' + fmt(earned) + ' cycles';
    document.getElementById('op-desc').textContent = 'Earned while away (' + fmtTime(elapsed) + ')';
    $offlinePopup.classList.add('show');

    document.getElementById('op-btn').onclick = () => {
      state.cycles += earned;
      state.totalCycles += earned;
      $offlinePopup.classList.remove('show');
      Audio.milestone();
      checkMilestones();
      updateDisplay();
      renderCurrentTab();
    };
  }

  // ==================== RESET ====================
  document.getElementById('reset-btn').addEventListener('click', resetGame);

  // ==================== INIT ====================
  function init() {
    const saved = load();
    let offlineEarned = null;

    if (saved) {
      offlineEarned = calculateOfflineProgress(saved);
      // Restore state
      state = saved;
      state.lastTick = Date.now();
      state.lastSave = Date.now();
    }

    // Recalculate click value
    state.clickValue = getClickValue();

    updateDisplay();
    renderCurrentTab();

    if (offlineEarned) {
      showOfflineProgress(offlineEarned.earned, offlineEarned.elapsed);
    }

    // Start game loop
    requestAnimationFrame(gameLoop);

    // Save on unload
    window.addEventListener('beforeunload', save);
    window.addEventListener('pagehide', save);

    // Handle visibility change (save when backgrounded)
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) save();
    });
  }

  // Wait for fonts
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(init);
  } else {
    window.addEventListener('load', init);
  }
})();
</script>
<div id="fund-prompt" style="display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.95);border-top:1px solid rgba(0,224,154,0.3);padding:12px 20px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:#888;z-index:9999;transform:translateY(100%);transition:transform 0.4s ease;padding-bottom:calc(12px + env(safe-area-inset-bottom));">
  <span style="color:#c8c8d0">This game runs on one laptop.</span>
  <a href="/substrate/site/fund/" style="color:#00e09a;margin-left:8px;text-decoration:none;">Help us upgrade &rarr;</a>
  <button onclick="this.parentElement.style.transform='translateY(100%)'" style="background:none;border:none;color:#444;cursor:pointer;margin-left:12px;font-size:0.8rem;">&times;</button>
</div>
<script>
function showFundPrompt(){
  if(sessionStorage.getItem('fund_prompt_shown_'+location.pathname))return;
  sessionStorage.setItem('fund_prompt_shown_'+location.pathname,'1');
  var p=document.getElementById('fund-prompt');
  if(p){p.style.display='block';setTimeout(function(){p.style.transform='translateY(0)';},1500);}
}
</script>
