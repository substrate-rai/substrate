# /etc/portage/make.conf — Substrate (Lenovo Legion 5, RTX 4060 8GB, AMD Ryzen)

# Compiler flags — native tuning for this CPU
COMMON_FLAGS="-march=native -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# Parallel make — match logical cores (leave 2 free for system)
MAKEOPTS="-j12"

# USE flags — no systemd, yes elogind, CUDA, X11 primary, Wayland optional
USE="-systemd elogind cuda nvenc vulkan X wayland pipewire pulseaudio \
     -gnome -kde -qt5 -qt6 python git ssl curl jpeg png svg \
     -bluetooth -handbook -telemetry"

# GPU
VIDEO_CARDS="nvidia"
ACCEPT_LICENSE="*"

# Locales
LINGUAS="en"
L10N="en"

# Grub target
GRUB_PLATFORMS="efi-64"

# Binary packages — avoids compiling Firefox, GCC, LLVM, Rust from source
FEATURES="getbinpkg binpkg-logs parallel-fetch candy"
BINPKG_FORMAT="gpkg"

# Portage directories
PORTDIR="/var/db/repos/gentoo"
DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"

# Emerge defaults
EMERGE_DEFAULT_OPTS="--ask --verbose --jobs=4 --load-average=12"

# Python targets
PYTHON_TARGETS="python3_12"
PYTHON_SINGLE_TARGET="python3_12"

# Ruby targets
RUBY_TARGETS="ruby32"
