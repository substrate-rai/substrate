;; Death Stranding — Polybar config
;; Bridges Cyan + Porter Gold on dark blue-black

[colors]
background = #cc0a0e14
background-alt = #cc121a24
foreground = #d4dde8
foreground-alt = #7a8a9a
primary = #1EA5C7
secondary = #FBC02D
alert = #c43030
disabled = #4a5568
cyan = #3dd8f0
amber = #c4983a
border = #2a3a4a
green = #30c470

[bar/main]
width = 100%
height = 30pt
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 0
border-bottom-size = 1
border-color = ${colors.border}

padding-left = 2
padding-right = 2
module-margin = 1

; Font stack
font-0 = "Rajdhani Light:size=11;3"
font-1 = "Rajdhani SemiBold:size=11;3"
font-2 = "Symbols Nerd Font:size=10;3"
font-3 = "Share Tech Mono:size=10;3"

modules-left = i3 sep shader
modules-center = date
modules-right = cpu gpu sep memory sep network sep battery

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

tray-position = right
tray-padding = 4

wm-restack = i3

[module/sep]
type = custom/text
content = "|"
content-foreground = ${colors.disabled}
content-font = 4

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true

label-focused = %name%
label-focused-foreground = ${colors.cyan}
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 2

label-visible = %name%
label-visible-foreground = ${colors.foreground-alt}
label-visible-padding = 2

[module/shader]
type = custom/script
exec = ~/.config/polybar/scripts/shader-name.sh
interval = 5
label = %output%
label-foreground = ${colors.secondary}
label-font = 1

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu-temp.sh
interval = 3
label = %output%
label-font = 4
label-foreground = ${colors.foreground}
format-prefix-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
format-prefix-font = 1
label = %percentage:2%%
label-font = 4
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "MEM "
format-prefix-foreground = ${colors.primary}
format-prefix-font = 1
label = %percentage_used:2%%
label-font = 4

[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected-prefix = "NET "
format-connected-prefix-foreground = ${colors.green}
format-connected-prefix-font = 1
label-connected = %essid%
label-connected-font = 4
format-disconnected-prefix = "NET "
format-disconnected-prefix-foreground = ${colors.alert}
format-disconnected-prefix-font = 1
label-disconnected = OFFLINE
label-disconnected-foreground = ${colors.alert}
label-disconnected-font = 4

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98
low-at = 15
format-charging-prefix = "BAT+ "
format-charging-prefix-foreground = ${colors.secondary}
format-charging-prefix-font = 1
label-charging = %percentage%%
label-charging-font = 4
format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.amber}
format-discharging-prefix-font = 1
label-discharging = %percentage%%
label-discharging-font = 4
format-low-prefix = "BAT! "
format-low-prefix-foreground = ${colors.alert}
format-low-prefix-font = 1
label-low = %percentage%%
label-low-foreground = ${colors.alert}
label-low-font = 4

[module/date]
type = internal/date
interval = 1
date = %Y.%m.%d
time = %H:%M:%S
label = %{T2}%date%%{T-}  %{T4}%time%%{T-}
label-foreground = ${colors.foreground}
