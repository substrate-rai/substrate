;; Death Stranding — Polybar config
;; Bridges Cyan + Porter Gold on dark blue-black

[colors]
background = #cc0a0e14
background-alt = #cc121a24
foreground = #d4dde8
foreground-alt = #7a8a9a
primary = #1EA5C7
secondary = #FBC02D
alert = #c43030
disabled = #4a5568
cyan = #3dd8f0
amber = #c4983a
border = #2a3a4a
green = #30c470

[bar/main]
width = 100%
height = 42pt
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 0
border-bottom-size = 1
border-color = ${colors.border}

padding-left = 2
padding-right = 2
module-margin = 1

; Font stack
font-0 = "Space Grotesk Light:size=14;4"
font-1 = "Space Grotesk:weight=bold:size=14;4"
font-2 = "Symbols Nerd Font:size=13;4"
font-3 = "Space Mono:size=13;4"

modules-left = i3 sep shader
modules-center = date
modules-right = tokens sep hpbars sep power

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

tray-position = right
tray-padding = 4

wm-restack = i3

[module/sep]
type = custom/text
content = "|"
content-foreground = ${colors.disabled}
content-font = 4

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true

label-focused = %name%
label-focused-foreground = ${colors.cyan}
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 2

label-visible = %name%
label-visible-foreground = ${colors.foreground-alt}
label-visible-padding = 2

[module/shader]
type = custom/script
exec = ~/.config/polybar/scripts/shader-name.sh
interval = 5
label = %output%
label-foreground = ${colors.secondary}
label-font = 1

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu-temp.sh
interval = 3
label = %output%
label-font = 4
label-foreground = ${colors.foreground}
format-prefix-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
format-prefix-font = 1
label = %percentage:2%%
label-font = 4
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "MEM "
format-prefix-foreground = ${colors.primary}
format-prefix-font = 1
label = %percentage_used:2%%
label-font = 4

[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected-prefix = "NET "
format-connected-prefix-foreground = ${colors.green}
format-connected-prefix-font = 1
label-connected = %essid%
label-connected-font = 4
format-disconnected-prefix = "NET "
format-disconnected-prefix-foreground = ${colors.alert}
format-disconnected-prefix-font = 1
label-disconnected = OFFLINE
label-disconnected-foreground = ${colors.alert}
label-disconnected-font = 4

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98
low-at = 15
format-charging-prefix = "BAT+ "
format-charging-prefix-foreground = ${colors.secondary}
format-charging-prefix-font = 1
label-charging = %percentage%%
label-charging-font = 4
format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.amber}
format-discharging-prefix-font = 1
label-discharging = %percentage%%
label-discharging-font = 4
format-low-prefix = "BAT! "
format-low-prefix-foreground = ${colors.alert}
format-low-prefix-font = 1
label-low = %percentage%%
label-low-foreground = ${colors.alert}
label-low-font = 4

[module/hpbars]
type = custom/script
exec = ~/.config/polybar/scripts/hp-bars.sh
interval = 3
label = %output%
label-font = 4

[module/tokens]
type = custom/script
exec = ~/.config/polybar/scripts/token-cost.sh
interval = 30
label = %output%
label-font = 4
label-foreground = ${colors.secondary}

[module/power]
type = custom/script
exec = cat /sys/class/power_supply/BAT0/power_now 2>/dev/null | awk '{printf "%.1fW", $1/1000000}'
interval = 5
label = %output%
label-font = 4
label-foreground = ${colors.amber}

[module/date]
type = internal/date
interval = 1
date = %Y.%m.%d
time = %H:%M:%S
label = %{T2}%date%%{T-}  %{T4}%time%%{T-}
label-foreground = ${colors.foreground}

;; ── BOTTOM BAR — DS Menu Buttons ──
[bar/hud]
width = 100%
height = 38pt
bottom = true

background = #cc0a0e14
foreground = ${colors.foreground-alt}

border-size = 0
border-top-size = 1
border-color = #1EA5C7

padding-left = 1
padding-right = 1
module-margin = 0

font-0 = "Space Grotesk Light:size=12;3"
font-1 = "Space Grotesk:weight=bold:size=12;3"
font-2 = "Space Mono:size=11;3"
font-3 = "Symbols Nerd Font:size=11;3"

modules-left = d-term d-web d-code d-launch d-div1 d-scan d-screenshot
modules-center = d-road d-server d-perf
modules-right = d-wallpaper d-screensaver d-div2 d-tile d-close

cursor-click = pointer
enable-ipc = true

; DS menu button style: %{O}=offset, %{U}=underline, +u/-u=toggle underline
; Each button: padded, uppercase, cyan underline on left

[module/d-div1]
type = custom/text
content = "%{F#2a3a4a}  |  %{F-}"

[module/d-div2]
type = custom/text
content = "%{F#2a3a4a}  |  %{F-}"

[module/d-term]
type = custom/text
content = "%{F#1EA5C7}  TERMINAL  %{F-}"
content-background = #15121a24
click-left = kitty &

[module/d-web]
type = custom/text
content = "%{F#7a8a9a}  WEB  %{F-}"
content-background = #15121a24
click-left = i3-msg workspace "2:WEB" &

[module/d-code]
type = custom/text
content = "%{F#7a8a9a}  CODE  %{F-}"
content-background = #15121a24
click-left = i3-msg workspace "3:CODE" &

[module/d-launch]
type = custom/text
content = "%{F#7a8a9a}  LAUNCHER  %{F-}"
content-background = #15121a24
click-left = rofi -show drun -theme death-stranding &

[module/d-scan]
type = custom/text
content = "%{F#3dd8f0}  SCAN  %{F-}"
content-background = #15121a24
click-left = /home/operator/substrate/scripts/detective-mode.sh &

[module/d-screenshot]
type = custom/text
content = "%{F#7a8a9a}  CAPTURE  %{F-}"
content-background = #15121a24
click-left = /home/operator/substrate/scripts/screenshot.sh &

[module/d-road]
type = custom/text
content = "%{F#30c470}  ROAD  %{F-}"
content-background = #15121a24
click-left = /home/operator/substrate/scripts/power-profile.sh road &

[module/d-server]
type = custom/text
content = "%{F#1EA5C7}  SERVER  %{F-}"
content-background = #15121a24
click-left = /home/operator/substrate/scripts/power-profile.sh server &

[module/d-perf]
type = custom/text
content = "%{F#FBC02D}  PERFORMANCE  %{F-}"
content-background = #15121a24
click-left = /home/operator/substrate/scripts/power-profile.sh performance &

[module/d-wallpaper]
type = custom/text
content = "%{F#3dd8f0}  WALLPAPER  %{F-}"
content-background = #15121a24
click-left = /home/operator/substrate/scripts/restart-desktop.sh &

[module/d-screensaver]
type = custom/text
content = "%{F#3dd8f0}  SCREENSAVER  %{F-}"
content-background = #15121a24
click-left = /home/operator/substrate/scripts/screensaver.sh &

[module/d-tile]
type = custom/text
content = "%{F#FBC02D}  TILE  %{F-}"
content-background = #15121a24
click-left = i3-msg floating toggle &

[module/d-close]
type = custom/text
content = "%{F#c43030}  CLOSE  %{F-}"
content-background = #15121a24
click-left = i3-msg kill &
