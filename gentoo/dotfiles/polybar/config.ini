;; Death Stranding — Polybar config
;; Bridges Cyan + Porter Gold on dark blue-black

[colors]
background = #cc0a0e14
background-alt = #cc121a24
foreground = #d4dde8
foreground-alt = #7a8a9a
primary = #1EA5C7
secondary = #FBC02D
alert = #c43030
disabled = #4a5568
cyan = #3dd8f0
amber = #c4983a
border = #2a3a4a
green = #30c470

[bar/main]
width = 100%
height = 42pt
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 0
border-bottom-size = 1
border-color = ${colors.border}

padding-left = 2
padding-right = 2
module-margin = 1

; Font stack
font-0 = "Rajdhani Light:size=16;5"
font-1 = "Rajdhani SemiBold:size=16;5"
font-2 = "Symbols Nerd Font:size=14;5"
font-3 = "Share Tech Mono:size=15;5"

modules-left = i3 sep shader
modules-center = date
modules-right = cpu gpu sep memory sep network sep battery

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

tray-position = right
tray-padding = 4

wm-restack = i3

[module/sep]
type = custom/text
content = "|"
content-foreground = ${colors.disabled}
content-font = 4

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true

label-focused = %name%
label-focused-foreground = ${colors.cyan}
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground-alt}
label-unfocused-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 2

label-visible = %name%
label-visible-foreground = ${colors.foreground-alt}
label-visible-padding = 2

[module/shader]
type = custom/script
exec = ~/.config/polybar/scripts/shader-name.sh
interval = 5
label = %output%
label-foreground = ${colors.secondary}
label-font = 1

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu-temp.sh
interval = 3
label = %output%
label-font = 4
label-foreground = ${colors.foreground}
format-prefix-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
format-prefix-font = 1
label = %percentage:2%%
label-font = 4
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "MEM "
format-prefix-foreground = ${colors.primary}
format-prefix-font = 1
label = %percentage_used:2%%
label-font = 4

[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected-prefix = "NET "
format-connected-prefix-foreground = ${colors.green}
format-connected-prefix-font = 1
label-connected = %essid%
label-connected-font = 4
format-disconnected-prefix = "NET "
format-disconnected-prefix-foreground = ${colors.alert}
format-disconnected-prefix-font = 1
label-disconnected = OFFLINE
label-disconnected-foreground = ${colors.alert}
label-disconnected-font = 4

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98
low-at = 15
format-charging-prefix = "BAT+ "
format-charging-prefix-foreground = ${colors.secondary}
format-charging-prefix-font = 1
label-charging = %percentage%%
label-charging-font = 4
format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.amber}
format-discharging-prefix-font = 1
label-discharging = %percentage%%
label-discharging-font = 4
format-low-prefix = "BAT! "
format-low-prefix-foreground = ${colors.alert}
format-low-prefix-font = 1
label-low = %percentage%%
label-low-foreground = ${colors.alert}
label-low-font = 4

[module/date]
type = internal/date
interval = 1
date = %Y.%m.%d
time = %H:%M:%S
label = %{T2}%date%%{T-}  %{T4}%time%%{T-}
label-foreground = ${colors.foreground}

;; ── BOTTOM BAR — RTS Command Card ──
[bar/hud]
width = 100%
height = 40pt
bottom = true

background = #aa0a0e14
foreground = ${colors.foreground-alt}

border-size = 0
border-top-size = 1
border-color = ${colors.border}

padding-left = 2
padding-right = 2
module-margin = 0

font-0 = "Rajdhani Light:size=15;4"
font-1 = "Rajdhani SemiBold:size=15;4"
font-2 = "Share Tech Mono:size=14;4"
font-3 = "Symbols Nerd Font:size=14;4"

modules-left = k-term k-sep k-web k-sep k-code k-sep k-launcher k-sep k-dropdown
modules-center = k-move k-sep k-resize k-sep k-tile k-sep k-close
modules-right = k-screensaver k-sep k-mode k-sep k-wallnext k-sep k-wallpause k-sep k-godot

cursor-click = pointer
enable-ipc = true
wm-restack = i3

[module/k-sep]
type = custom/text
content = "  "

[module/k-term]
type = custom/text
content = "%{T1}%{F#1EA5C7}Super+Enter%{F-}%{T-} %{T2}Terminal%{T-}"
click-left = kitty &

[module/k-web]
type = custom/text
content = "%{T1}%{F#1EA5C7}Super+2%{F-}%{T-} %{T2}Web%{T-}"
click-left = i3-msg workspace "2:WEB" &

[module/k-code]
type = custom/text
content = "%{T1}%{F#1EA5C7}Super+3%{F-}%{T-} %{T2}Code%{T-}"
click-left = i3-msg workspace "3:CODE" &

[module/k-launcher]
type = custom/text
content = "%{T1}%{F#1EA5C7}Super+D%{F-}%{T-} %{T2}Launcher%{T-}"
click-left = rofi -show drun -theme death-stranding &

[module/k-dropdown]
type = custom/text
content = "%{T1}%{F#1EA5C7}Super+`%{F-}%{T-} %{T2}Dropdown%{T-}"
click-left = /home/operator/substrate/scripts/dropdown-terminal.sh &

[module/k-move]
type = custom/text
content = "%{T1}%{F#FBC02D}Super+Drag%{F-}%{T-} %{T2}Move%{T-}"

[module/k-resize]
type = custom/text
content = "%{T1}%{F#FBC02D}Super+R%{F-}%{T-} %{T2}Resize%{T-}"

[module/k-tile]
type = custom/text
content = "%{T1}%{F#FBC02D}Super+T%{F-}%{T-} %{T2}Tile%{T-}"
click-left = i3-msg floating toggle &

[module/k-close]
type = custom/text
content = "%{T1}%{F#c43030}Super+Shift+Q%{F-}%{T-} %{T2}Close%{T-}"

[module/k-screensaver]
type = custom/text
content = "%{T1}%{F#3dd8f0}Super+Shift+S%{F-}%{T-} %{T2}Screensaver%{T-}"
click-left = /home/operator/substrate/scripts/screensaver.sh &

[module/k-mode]
type = custom/text
content = "%{T1}%{F#3dd8f0}Super+Shift+M%{F-}%{T-} %{T2}Mode%{T-}"
click-left = /home/operator/substrate/scripts/shell_mode.sh toggle &

[module/k-wallnext]
type = custom/text
content = "%{T1}%{F#3dd8f0}Super+Right%{F-}%{T-} %{T2}Next%{T-}"
click-left = python3 /home/operator/substrate/scripts/next_wallpaper.py &

[module/k-wallpause]
type = custom/text
content = "%{T1}%{F#3dd8f0}Super+P%{F-}%{T-} %{T2}Pause%{T-}"
click-left = python3 /home/operator/substrate/scripts/pause_rotation.py &

[module/k-godot]
type = custom/text
content = "%{T1}%{F#3dd8f0}Super+Shift+G%{F-}%{T-} %{T2}Godot%{T-}"
click-left = /home/operator/substrate/scripts/restart-desktop.sh &
