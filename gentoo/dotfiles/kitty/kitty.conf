# Death Stranding — kitty terminal theme

# Font
font_family      IBM Plex Mono
bold_font        IBM Plex Mono Bold
italic_font      IBM Plex Mono Italic
bold_italic_font IBM Plex Mono Bold Italic
font_size        11.0

# Cursor — Bridges Cyan beam
cursor                  #1EA5C7
cursor_text_color       #0a0e14
cursor_shape            beam
cursor_beam_thickness   1.5

# Scrollback
scrollback_lines 10000

# Mouse
url_color #1EA5C7
url_style curly

# Window layout — breathing room
window_padding_width 8 12
placement_strategy center

# Tab bar — DS menu style
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style angled
tab_bar_min_tabs 2
active_tab_foreground   #0a0e14
active_tab_background   #1EA5C7
active_tab_font_style   bold
inactive_tab_foreground #7a8a9a
inactive_tab_background #121a24
inactive_tab_font_style normal

# Opacity — translucent over Godot shaders
background_opacity 0.88
dynamic_background_opacity yes

# Bell
enable_audio_bell no

# Colors — Death Stranding palette
foreground              #d4dde8
background              #0a0e14
selection_foreground     #0a0e14
selection_background     #1EA5C7

# Normal colors
color0  #0a0e14
color1  #c43030
color2  #30c470
color3  #c4983a
color4  #1a6080
color5  #8a5090
color6  #5a8a9a
color7  #7a8a9a

# Bright colors
color8  #2a3a4a
color9  #e85050
color10 #50e890
color11 #FBC02D
color12 #1EA5C7
color13 #b070c0
color14 #3dd8f0
color15 #d4dde8

# Mark colors (DS accents)
mark1_foreground #0a0e14
mark1_background #1EA5C7
mark2_foreground #0a0e14
mark2_background #FBC02D
mark3_foreground #0a0e14
mark3_background #c43030
