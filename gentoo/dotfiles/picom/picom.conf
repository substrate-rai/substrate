# Death Stranding — picom compositor config
# Translucent panels, frosted glass blur, blue-tinted shadows

backend = "glx";
vsync = true;
use-damage = true;
glx-no-stencil = true;

# Shadows — subtle, blue-tinted
shadow = true;
shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.35;
shadow-color = "#0a1a2a";
shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Godot'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Fading — smooth transitions
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.08;
fade-delta = 5;
fade-exclude = [];

# Opacity — DS-style translucent panels
active-opacity = 0.92;
inactive-opacity = 0.82;
frame-opacity = 0.7;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'firefox'",
  "100:class_g = 'mpv'",
  "100:class_g = 'feh'",
  "100:class_g = 'Godot'",
  "95:class_g = 'Rofi'",
  "88:class_g = 'kitty' && focused",
  "78:class_g = 'kitty' && !focused",
  "95:class_g = 'Polybar'"
];

# Blur — gaussian (more stable on NVIDIA than dual_kawase)
blur-method = "gaussian";
blur-size = 12;
blur-deviation = 6.0;
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;
blur-kern = "3x3box";
blur-background-exclude = [
  "class_g = 'Godot'",
  "class_g = 'kitty'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Corners — slight rounding (approximation of DS cut corners)
corner-radius = 4;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "window_type = 'dock'"
];

# Window type rules
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.85; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.90; shadow = true; };
  dropdown_menu = { opacity = 0.90; shadow = true; };
};
