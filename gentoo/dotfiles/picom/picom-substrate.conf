# Death Stranding — picom substrate mode
# Animated transitions, enhanced blur, fluid feel

backend = "glx";
vsync = true;
use-damage = true;
glx-no-stencil = true;

# Shadows — blue-tinted, deeper than classic
shadow = true;
shadow-radius = 16;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.45;
shadow-color = "#0a1a2a";
shadow-exclude = [
  "class_g = 'Godot'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@"
];

# Fading — smooth
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.06;
fade-delta = 4;

# Opacity
active-opacity = 0.90;
inactive-opacity = 0.78;
frame-opacity = 0.7;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'firefox'",
  "100:class_g = 'mpv'",
  "100:class_g = 'feh'",
  "100:class_g = 'Godot'",
  "95:class_g = 'Rofi'",
  "90:class_g = 'kitty' && focused",
  "75:class_g = 'kitty' && !focused",
  "95:class_g = 'Polybar'"
];

# Blur — gaussian (stable on NVIDIA)
blur-method = "gaussian";
blur-size = 16;
blur-deviation = 8.0;
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;
blur-kern = "3x3box";
blur-background-exclude = [
  "class_g = 'Godot'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@"
];

# Corners
corner-radius = 6;
rounded-corners-exclude = [
  "window_type = 'dock'"
];

# ── DS-style animations (picom v12.5) ──
animations = (
  {
    triggers = ["open"];
    preset = "fly-in";
    direction = "up";
    duration = 0.3;
  },
  {
    triggers = ["close"];
    preset = "fly-out";
    direction = "down";
    duration = 0.2;
  },
  {
    triggers = ["show"];
    preset = "appear";
    scale = 0.9;
    duration = 0.25;
  },
  {
    triggers = ["hide"];
    preset = "disappear";
    scale = 0.9;
    duration = 0.2;
  },
  {
    triggers = ["geometry"];
    preset = "geometry-change";
    duration = 0.15;
  }
);

# Window type rules
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.85; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.90; shadow = true; };
  dropdown_menu = { opacity = 0.90; shadow = true; };
};
