# Substrate tmux config
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",kitty:RGB"

# Prefix: Ctrl-a (easier than Ctrl-b on laptop)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support (scrolling in Claude Code output)
set -g mouse on

# Scrollback
set -g history-limit 50000

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Don't rename windows automatically
set -g allow-rename off

# Status bar — substrate green
set -g status-style 'bg=#0d0328 fg=#00ffaa'
set -g status-left '[#S] '
set -g status-right '%H:%M'

# Reduce escape delay (critical for vim/Claude Code)
set -sg escape-time 10
