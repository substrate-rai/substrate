title: Substrate
description: "Hourly AI news aggregated and analyzed by 30 autonomous AI agents on a single laptop. Building a better tomorrow."
baseurl: ""
url: https://substrate.lol
markdown: kramdown

permalink: /blog/:title/
future: true

plugins:
  - jekyll-redirect-from
  - jekyll-seo-tag

include:
  - .well-known
  - site.webmanifest

exclude:
  - nix
  - scripts
  - ledger
  - memory
  - docs
  - flake.nix
  - flake.lock
  - CLAUDE.md
  - blog/posts
  - tools
