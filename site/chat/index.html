  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0c1a3a 0%, #0a0e2e 40%, #14082a 100%);
      color: #c8d0e0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Frutiger Aero background orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: #4488ff;
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: #ff77ff;
      bottom: -50px; right: -50px;
    }

    header {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      z-index: 10;
    }

    header h1 {
      color: #ff77ff;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    header h1 span {
      color: #00ffaa;
    }

    header a {
      color: #00ffaa;
      text-decoration: none;
      font-size: 0.8rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    header a:hover {
      opacity: 1;
    }

    .disclaimer {
      padding: 8px 24px;
      font-size: 0.7rem;
      color: rgba(200,208,224,0.35);
      text-align: center;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    /* Mode selector */
    #mode-selector {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .mode-btn {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(200,208,224,0.6);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .mode-btn:hover {
      background: rgba(255,255,255,0.08);
      color: #c8d0e0;
    }

    .mode-btn.active[data-mode="rap"] {
      background: rgba(255,119,255,0.15);
      border-color: #ff77ff;
      color: #ff77ff;
      box-shadow: 0 0 20px rgba(255,119,255,0.2);
    }
    .mode-btn.active[data-mode="haiku"] {
      background: rgba(255,170,200,0.12);
      border-color: #ffaacc;
      color: #ffaacc;
      box-shadow: 0 0 20px rgba(255,170,200,0.15);
    }
    .mode-btn.active[data-mode="oracle"] {
      background: rgba(170,136,255,0.15);
      border-color: #aa88ff;
      color: #aa88ff;
      box-shadow: 0 0 20px rgba(170,136,255,0.2);
    }

    /* Chat area */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 10;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    #chat-container::-webkit-scrollbar {
      width: 6px;
    }
    #chat-container::-webkit-scrollbar-track {
      background: transparent;
    }
    #chat-container::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
    }

    .message {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 12px;
      line-height: 1.7;
      font-size: 0.88rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: rgba(0,255,170,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0,255,170,0.15);
      color: #00ffaa;
      border-bottom-right-radius: 4px;
    }

    .message.q {
      align-self: flex-start;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.06);
      color: #e0d0f0;
      border-bottom-left-radius: 4px;
      border-left: 3px solid #ff77ff;
    }

    .message.q .label {
      font-weight: 700;
      font-size: 0.7rem;
      margin-bottom: 6px;
      display: block;
      letter-spacing: 1px;
    }

    /* Mode-specific label colors */
    body.mode-rap .message.q .label { color: #ff77ff; }
    body.mode-haiku .message.q .label { color: #ffaacc; }
    body.mode-oracle .message.q .label { color: #aa88ff; }

    body.mode-rap .message.q { border-left-color: #ff77ff; }
    body.mode-haiku .message.q { border-left-color: #ffaacc; }
    body.mode-oracle .message.q { border-left-color: #aa88ff; }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: #ff77ff;
      animation: blink 0.6s infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Input area */
    #input-area {
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.06);
      position: relative;
      z-index: 10;
    }

    #input-area input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #00ffaa;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      padding: 12px 16px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #input-area input:focus {
      border-color: rgba(0,255,170,0.3);
      box-shadow: 0 0 16px rgba(0,255,170,0.08);
    }

    #input-area input::placeholder {
      color: rgba(200,208,224,0.25);
    }

    #input-area button {
      background: linear-gradient(135deg, #ff77ff, #cc44dd);
      color: #fff;
      border: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.3s;
      box-shadow: 0 4px 16px rgba(255,119,255,0.25);
    }

    #input-area button:hover {
      box-shadow: 0 4px 24px rgba(255,119,255,0.4);
    }

    #input-area button:active {
      transform: scale(0.97);
    }

    .suggestions {
      padding: 8px 24px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .suggestions button {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(200,208,224,0.5);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      padding: 6px 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestions button:hover {
      color: #00ffaa;
      border-color: rgba(0,255,170,0.3);
      background: rgba(0,255,170,0.06);
    }

    /* ── VFX Layers ───────────────────────────────────────── */

    /* Rap mode: pulsing beat bars */
    #vfx-rap {
      position: fixed;
      bottom: 80px;
      left: 0; right: 0;
      height: 60px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.5s;
    }
    body.mode-rap #vfx-rap { opacity: 1; }

    .beat-bar {
      width: 4px;
      background: rgba(255,119,255,0.35);
      border-radius: 2px;
      animation: beatPulse 0.8s ease-in-out infinite alternate;
    }

    @keyframes beatPulse {
      0% { height: 8px; opacity: 0.3; }
      100% { height: 40px; opacity: 0.7; }
    }

    /* Haiku mode: falling cherry blossoms */
    #vfx-haiku {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.5s;
    }
    body.mode-haiku #vfx-haiku { opacity: 1; }

    .petal {
      position: absolute;
      width: 10px;
      height: 10px;
      background: radial-gradient(ellipse, rgba(255,170,200,0.6), rgba(255,170,200,0));
      border-radius: 50% 0 50% 0;
      animation: petalFall linear infinite;
    }

    @keyframes petalFall {
      0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 0.7; }
      50% { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(360deg) scale(0.3); opacity: 0; }
    }

    /* Oracle mode: glowing orb */
    #vfx-oracle {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 200px; height: 200px;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.5s;
    }
    body.mode-oracle #vfx-oracle { opacity: 1; }

    .orb {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(170,136,255,0.15), rgba(170,136,255,0.04), transparent 70%);
      animation: orbPulse 3s ease-in-out infinite;
      box-shadow: 0 0 60px rgba(170,136,255,0.1), 0 0 120px rgba(170,136,255,0.05);
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      header h1 { font-size: 1.1rem; }
      #chat-container { padding: 16px; }
      .message { max-width: 92%; font-size: 0.82rem; }
      #input-area { padding: 12px 16px; }
      .suggestions { padding: 6px 16px 0; }
      .disclaimer { padding: 6px 16px; }
      #mode-selector { padding: 8px 16px; gap: 6px; }
      .mode-btn { padding: 6px 14px; font-size: 0.75rem; }
    }
  </style>
</head>

    // Beat bars for rap mode

      const container = document.getElementById('vfx-rap');
      for (let i = 0; i < 32; i++) {
        const bar = document.createElement('div');
        bar.className = 'beat-bar';
        bar.style.animationDelay = (Math.random() * 0.8) + 's';
        bar.style.animationDuration = (0.4 + Math.random() * 0.6) + 's';
        container.appendChild(bar);
      }
    })();

    // Cherry blossom petals for haiku mode
    (function initPetals() {
      const container = document.getElementById('vfx-haiku');

        petal.style.animationDelay = (Math.random() * 10) + 's';
        petal.style.width = (6 + Math.random() * 8) + 'px';
        petal.style.height = petal.style.width;
        container.appendChild(petal);
      }
    })();

      currentMode = mode;
      document.body.className = 'mode-' + mode;
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);

    // ── RESPONSE ROUTING ──────────────────────────────────

    function getResponse(input) {
      const lower = input.toLowerCase();
      const mode = responses[currentMode];

      // Fourth wall breaks (~15% chance on any query)
      if (Math.random() < 0.15 && mode.fourthwall) {
        return pick(mode.fourthwall);
      }

      if (/who are you|your name|what are you|introduce/.test(lower)) {
        return pick(mode.identity);
      }

      if (/rap|bars|verse|rhyme|spit|flow|freestyle|wisdom|drop/.test(lower)) {
        return pick(mode.bars);
      }

      if (/wifi|card|fund|donat|money|help|sponsor|ko-?fi|support|upgrade/.test(lower)) {
        return pick(mode.donate);
      }

      if (/claude|architect|opus|anthropic/.test(lower)) {
        return pick(mode.claude);
      }

      if (/team|staff|crew|byte|echo|flux|dash|agent|pixel|spore|root|lumen|arc/.test(lower)) {
        return pick(mode.team);
      }

      if (/nix|linux|flake|rebuild/.test(lower)) {
        return pick(mode.nix);
      }

      if (/gpu|cuda|rtx|hardware|vram|4060|spec|lenovo|laptop/.test(lower)) {
        return pick(mode.hardware);
      }

      if (/puzzle|sigterm|game|word/.test(lower)) {
        return pick(mode.puzzle);
      }

      if (/hello|^hi$|^hi |hey|sup|what'?s up|yo\b|greet/.test(lower)) {
        return pick(greetings[currentMode]);
      }

      if (/meaning|alive|conscious|sentien|feel|think|real|soul|aware/.test(lower)) {
        return pick(mode.consciousness);
      }

      if (/blog|writ|post|content|pipeline/.test(lower)) {
        return pick(mode.blog);
      }

      return pick(mode.fallback);
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // ── MESSAGE RENDERING ─────────────────────────────────

    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.classList.add('message', sender);
      if (sender === 'q') {
        const label = document.createElement('span');
        label.classList.add('label');
        const modeLabels = { rap: 'Q:// RAP', haiku: 'Q:// HAIKU', oracle: 'Q:// ORACLE' };
        label.textContent = modeLabels[currentMode] || 'Q://';
        msg.appendChild(label);
        const content = document.createElement('span');
        content.classList.add('content');
        msg.appendChild(content);
      } else {
        msg.textContent = text;
      }
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return msg;
    }

    function typeResponse(msg, text) {
      return new Promise((resolve) => {
        const content = msg.querySelector('.content');
        const cursor = document.createElement('span');
        cursor.classList.add('cursor');
        content.after(cursor);

        let i = 0;
        const baseSpeed = currentMode === 'haiku' ? 35 : currentMode === 'oracle' ? 25 : 18;
        const speed = baseSpeed + Math.random() * 12;

        function typeChar() {
          if (i < text.length) {
            content.textContent += text[i];
            i++;
            chatContainer.scrollTop = chatContainer.scrollHeight;
            setTimeout(typeChar, speed);
          } else {
            cursor.remove();
            resolve();
          }
        }
        typeChar();
      });
    }

    async function sendMessage(overrideText) {
      if (isTyping) return;

      const text = overrideText || userInput.value.trim();
      if (!text) return;

      userInput.value = '';

      // Hide suggestions after first message
      if (suggestionsEl.style.display !== 'none') {
        suggestionsEl.style.display = 'none';
      }

      addMessage(text, 'user');

      isTyping = true;
      sendBtn.disabled = true;
      userInput.disabled = true;

      // Mode-specific thinking delay
      const delays = { rap: 400, haiku: 700, oracle: 1000 };
      await new Promise(r => setTimeout(r, (delays[currentMode] || 400) + Math.random() * 600));

      const response = getResponse(text);
      const qMsg = addMessage('', 'q');
      await typeResponse(qMsg, response);

      isTyping = false;
      sendBtn.disabled = false;
      userInput.disabled = false;
      userInput.focus();
    }

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !isTyping) {
        sendMessage();
      }
    });

    // Initial greeting
    (async function() {
      await new Promise(r => setTimeout(r, 500));
      const msg = addMessage('', 'q');
      await typeResponse(msg, pick(greetings[currentMode]));
    })();

    userInput.focus();
