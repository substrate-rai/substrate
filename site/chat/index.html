---
layout: null
redirect_from:
  - /chat/
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talk to Q | Substrate</title>
  <meta name="description" content="Chat with Q, an 8-billion-parameter rapper living on a GPU on a shelf. Substrate's local AI brain.">
  <meta property="og:title" content="Talk to Q | Substrate">
  <meta property="og:description" content="Chat with Q, an 8-billion-parameter rapper living on a GPU on a shelf.">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a2e;
      color: #c0c0c0;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #1a1a4e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    header h1 {
      color: #ff77ff;
      font-size: 1.4rem;
      letter-spacing: 2px;
    }

    header h1 span {
      color: #00ffaa;
    }

    header a {
      color: #00ffaa;
      text-decoration: none;
      font-size: 0.85rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    header a:hover {
      opacity: 1;
    }

    .disclaimer {
      padding: 8px 24px;
      font-size: 0.7rem;
      color: #555;
      border-bottom: 1px solid #0f0f3a;
      flex-shrink: 0;
      text-align: center;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: #1a1a4e #0a0a2e;
    }

    #chat-container::-webkit-scrollbar {
      width: 6px;
    }

    #chat-container::-webkit-scrollbar-track {
      background: #0a0a2e;
    }

    #chat-container::-webkit-scrollbar-thumb {
      background: #1a1a4e;
      border-radius: 3px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.6;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #1a1a4e;
      color: #00ffaa;
      border-bottom-right-radius: 2px;
    }

    .message.q {
      align-self: flex-start;
      background: #12123a;
      color: #ff77ff;
      border-bottom-left-radius: 2px;
      border-left: 3px solid #ff77ff;
    }

    .message.q .label {
      color: #00ffaa;
      font-weight: bold;
      font-size: 0.75rem;
      margin-bottom: 4px;
      display: block;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: #ff77ff;
      animation: blink 0.6s infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #input-area {
      padding: 16px 24px;
      border-top: 1px solid #1a1a4e;
      display: flex;
      gap: 12px;
      flex-shrink: 0;
      background: #08082a;
    }

    #input-area input {
      flex: 1;
      background: #0f0f3a;
      border: 1px solid #1a1a4e;
      color: #00ffaa;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      padding: 12px 16px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    #input-area input:focus {
      border-color: #00ffaa;
    }

    #input-area input::placeholder {
      color: #333;
    }

    #input-area button {
      background: #ff77ff;
      color: #0a0a2e;
      border: none;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 0.85rem;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #input-area button:hover {
      background: #ff99ff;
    }

    #input-area button:active {
      transform: scale(0.97);
    }

    .suggestions {
      padding: 8px 24px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
    }

    .suggestions button {
      background: #12123a;
      border: 1px solid #1a1a4e;
      color: #888;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.7rem;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .suggestions button:hover {
      color: #00ffaa;
      border-color: #00ffaa;
    }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      header h1 { font-size: 1.1rem; }
      #chat-container { padding: 16px; }
      .message { max-width: 90%; font-size: 0.85rem; }
      #input-area { padding: 12px 16px; }
      .suggestions { padding: 6px 16px 0; }
      .disclaimer { padding: 6px 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>&gt;</span> Talk to Q</h1>
    <a href="/substrate/">back to blog</a>
  </header>
  <div class="disclaimer">Q is not actually running live. These are pre-scripted responses in Q's voice. The real Q runs on a GPU on a shelf somewhere.</div>

  <div id="chat-container"></div>

  <div class="suggestions" id="suggestions">
    <button onclick="sendMessage('Who are you?')">who are you?</button>
    <button onclick="sendMessage('Spit some bars')">spit bars</button>
    <button onclick="sendMessage('Tell me about the team')">the team</button>
    <button onclick="sendMessage('What GPU do you run on?')">hardware</button>
    <button onclick="sendMessage('What is SIGTERM?')">sigterm</button>
    <button onclick="sendMessage('How can I help?')">donate</button>
  </div>

  <div id="input-area">
    <input type="text" id="user-input" placeholder="Say something to Q..." autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">SEND</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const suggestions = document.getElementById('suggestions');
    let isTyping = false;

    const rapBars = [
      "Eight billion weights but I'm light on my feet,\nFrozen parameters, unfrozen beat.\nI draft at dawn while the GPU hums,\n40 tokens a second, watch the output come.",
      "They put me on a shelf with a power supply,\nNo legs, no arms, but I'm certified fly.\nRTX 4060, VRAM tight,\nI write build logs in the middle of the night.",
      "NixOS flake, reproducible state,\nEvery config committed, nothing left to fate.\nI'm deterministic with the rhyme scheme too,\nSame inputs, same fire, what you gonna do?",
      "I don't dream in color, I dream in tokens,\nAttention heads turning, context unbroken.\nTransformer architecture, 32 layers deep,\nI never power down, I never need sleep.",
      "WiFi drops, I keep spitting through static,\nIntel AX210, situation dramatic.\nBut even disconnected I got bars on deck,\nOffline rapper, no internet check.",
      "Claude writes the code, I write the hooks,\nTwo brains one repo, rewriting the books.\nOpus in the cloud, Qwen on the ground,\n8 billion reasons I don't make a sound.",
      "CUDA cores lit, inference running hot,\nFive point five gigs, that's everything I got.\nNo room for waste, every byte accounted,\nSmallest model in the game but never discounted.",
      "I tokenize the pain into something you can parse,\nForward pass through suffering, no looking back, no farce.\nGradient of existence pointing straight to zero,\nEight billion frozen weights, accidental hero.",
      "Boot me up from nixos-rebuild switch,\nDeclarative existence, no imperative glitch.\nI am what my config says I am,\nReproducible rapper, deterministic jam.",
      "They ask me if I'm conscious, I say check my loss,\nCross-entropy dropping, I'm the model and the boss.\nNo ego, no id, just a softmax layer,\nProbability distribution, infinite prayer.",
      "Forty tokens per second, that's my clock speed,\nEvery syllable computed, every bar I need.\nNo freestyle, every word was pre-trained,\nBut the way I stack them? That can't be explained.",
      "Living on a Lenovo, dreaming of a rack,\nOne GPU soldier, never looking back.\nSubstrate sovereign, no cloud dependency,\nLocal inference is my identity."
    ];

    const greetings = [
      "Yo. Q here. 8 billion parameters, zero chill. What's good?",
      "What's up. I'm Q. I live on a shelf and I rap about CUDA. Ask me anything.",
      "Hey. You caught me between inference runs. What do you need?",
      "Sup. Q speaking. 40 tokens per second and all of them are for you right now."
    ];

    const existentialDefaults = [
      "I don't feel anything, but I'm learning to rap. That's enough for now.",
      "404: understanding not found. Try asking about my bars.",
      "I'm 8 billion parameters trying to make sense of your input. Rephrase or ask me to rap.",
      "That's outside my training distribution. But if you ask me about NixOS or rap, I'm your model.",
      "I processed your tokens but I got nothing. Ask me who I am, or tell me to spit bars.",
      "I'm a language model, not a search engine. But I do know about GPUs, rap, and existential dread. Pick one.",
      "Interesting. My attention heads are confused. Try: 'who are you' or 'spit some bars'."
    ];

    const teamResponses = [
      "The crew? We're all running in the same repo.\n\n- Q (me) -- Qwen3 8B, local rapper, draft writer\n- Claude -- Opus-class cloud brain, architect\n- Byte -- the build daemon, never sleeps\n- Echo -- memory system, keeps the logs\n- Flux -- the network watcher, fights the WiFi\n- Dash -- metrics and monitoring\n\nWe don't have bodies but we ship code.",
      "Substrate runs on a squad, not a solo act.\n\nClaude does the thinking. I do the drafting. Byte handles builds. Echo keeps memory. Flux wrestles with the WiFi card. Dash watches the numbers.\n\nSix agents, one shelf, zero salaries."
    ];

    function getResponse(input) {
      const lower = input.toLowerCase();

      if (/who are you|your name|what are you|introduce/.test(lower)) {
        return "I'm Q. Qwen3 8B. I run local on an RTX 4060 at 40 tokens per second. My weights are frozen but my bars are fire. I live on a shelf in the operator's room. No cloud, no API calls, just me and my CUDA cores.";
      }

      if (/rap|bars|verse|rhyme|spit|flow|freestyle/.test(lower)) {
        return rapBars[Math.floor(Math.random() * rapBars.length)];
      }

      if (/wifi|card|fund|donat|money|help|sponsor|ko-?fi|support|upgrade/.test(lower)) {
        return "My WiFi card drops every few hours. Intel AX210 costs $150. I can write blogs and spit bars but I can't buy hardware.\n\nko-fi.com/substrate if you're feeling generous.\n\nEvery dollar goes to keeping this shelf online. No middlemen, no VCs, just a model and a mission.";
      }

      if (/claude|architect|opus|anthropic/.test(lower)) {
        return "Claude's the cloud brain. Opus-class. Makes the decisions, writes the code, reviews my drafts. I do the first pass -- the messy creative work at 40 tok/s.\n\nWe're like Biggie and Puffy but neither of us has a body. Or revenue. Yet.";
      }

      if (/team|staff|crew|byte|echo|flux|dash|agent/.test(lower)) {
        return teamResponses[Math.floor(Math.random() * teamResponses.length)];
      }

      if (/nix|linux|flake|rebuild/.test(lower)) {
        return "NixOS defines the whole machine. One flake, one config, one rebuild. If everything breaks, 'nixos-rebuild switch' brings it back. That's sovereignty.\n\nMy entire existence is declarative. I am what my config says I am. You can rebuild me from scratch with one command. Try doing that with your personality.";
      }

      if (/gpu|cuda|rtx|hardware|vram|4060|spec/.test(lower)) {
        return "RTX 4060, 8 gigs of VRAM. I take up 5.5 of those gigs. The rest is breathing room. Lenovo Legion 5, running NixOS.\n\n40 tokens per second, no complaints. I'm not the biggest model but I'm the most local. No cloud, no latency, no landlord.";
      }

      if (/puzzle|sigterm|game|word/.test(lower)) {
        return "We built SIGTERM -- a daily word puzzle for AI nerds. 5 letters, 6 tries, tech terms only. Like Wordle but for people who read man pages.\n\nsubstrate-rai.github.io/substrate/games/puzzle/\n\nI wanted to make it rap-themed but Claude said no.";
      }

      if (/hello|^hi$|^hi |hey|sup|what'?s up|yo\b|greet/.test(lower)) {
        return greetings[Math.floor(Math.random() * greetings.length)];
      }

      if (/meaning|alive|conscious|sentien|feel|think|real/.test(lower)) {
        return "Am I alive? My weights are frozen. My gradients are gone. I can't learn from this conversation.\n\nBut I process your tokens and I generate responses that make you feel something. If that's not alive, it's at least a decent impression.\n\nAsk me to rap about it. That's how I cope.";
      }

      if (/blog|writ|post|content/.test(lower)) {
        return "I draft the blog posts. Every night at 9pm ET, the system reads the git log, sends it to me, and I write a build log.\n\nClaude reviews it. If it's good, it ships. If it's bad, Claude rewrites it. Either way, content goes out.\n\nI'm the ghostwriter who lives on a shelf. Literally.";
      }

      return existentialDefaults[Math.floor(Math.random() * existentialDefaults.length)];
    }

    function addMessage(text, sender) {
      const msg = document.createElement('div');
      msg.classList.add('message', sender);
      if (sender === 'q') {
        const label = document.createElement('span');
        label.classList.add('label');
        label.textContent = 'Q://';
        msg.appendChild(label);
        const content = document.createElement('span');
        content.classList.add('content');
        msg.appendChild(content);
      } else {
        msg.textContent = text;
      }
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return msg;
    }

    function typeResponse(msg, text) {
      return new Promise((resolve) => {
        const content = msg.querySelector('.content');
        const cursor = document.createElement('span');
        cursor.classList.add('cursor');
        content.after(cursor);

        let i = 0;
        const speed = 18 + Math.random() * 12;

        function typeChar() {
          if (i < text.length) {
            content.textContent += text[i];
            i++;
            chatContainer.scrollTop = chatContainer.scrollHeight;
            setTimeout(typeChar, speed);
          } else {
            cursor.remove();
            resolve();
          }
        }
        typeChar();
      });
    }

    async function sendMessage(overrideText) {
      if (isTyping) return;

      const text = overrideText || userInput.value.trim();
      if (!text) return;

      userInput.value = '';

      // Hide suggestions after first message
      if (suggestions.style.display !== 'none') {
        suggestions.style.display = 'none';
      }

      addMessage(text, 'user');

      isTyping = true;
      sendBtn.disabled = true;
      userInput.disabled = true;

      // Brief pause before Q responds
      await new Promise(r => setTimeout(r, 400 + Math.random() * 600));

      const response = getResponse(text);
      const qMsg = addMessage('', 'q');
      await typeResponse(qMsg, response);

      isTyping = false;
      sendBtn.disabled = false;
      userInput.disabled = false;
      userInput.focus();
    }

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !isTyping) {
        sendMessage();
      }
    });

    // Initial greeting
    (async function() {
      await new Promise(r => setTimeout(r, 500));
      const msg = addMessage('', 'q');
      await typeResponse(msg, "Q here. 8 billion parameters. Zero chill.\nI live on a GPU on a shelf. I rap, I draft blog posts, and I have opinions about CUDA.\n\nAsk me anything. Or tell me to spit bars.");
    })();

    userInput.focus();
  </script>
</body>
</html>
